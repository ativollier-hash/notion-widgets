<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:#faf8f5;padding:14px}
.w{background:#fff;border-radius:22px;padding:24px;max-width:700px;margin:0 auto;box-shadow:0 4px 24px rgba(0,0,0,.05);border:1px solid #ece8e2;text-align:center}
h2{font-family:'Playfair Display',serif;font-size:18px;color:#2d2a26;margin-bottom:4px}
.day{font-size:11px;color:#b0ab9f;font-weight:600;margin-bottom:14px}
.row{display:flex;gap:20px}
.col{flex:1;min-width:0;text-align:center}
.name{font-size:14px;font-weight:700;color:#2d2a26;margin-bottom:1px}
.obj{font-size:10px;color:#b0ab9f;font-weight:600;margin-bottom:10px}
.glass{position:relative;width:80px;height:160px;margin:0 auto 10px;border:3px solid #c0d8ec;border-top:none;border-radius:0 0 16px 16px;background:#f5faff;overflow:hidden}
.glass-rim{width:86px;height:5px;background:#c0d8ec;border-radius:4px;margin:0 auto}
.water{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(180deg,#8ed4f8 0%,#4ba8e8 100%);transition:height .7s cubic-bezier(.4,0,.2,1);border-radius:0 0 13px 13px}
.pct{position:absolute;bottom:8px;left:0;right:0;font-family:'Playfair Display',serif;font-size:16px;font-weight:800;color:rgba(255,255,255,.95);text-shadow:0 1px 2px rgba(0,0,0,.2);z-index:2}
.lit{font-family:'Playfair Display',serif;font-size:24px;font-weight:800;color:#4ba8e8}
.of{font-size:11px;color:#9a958e;font-weight:600;margin-bottom:8px}
.btns{display:flex;gap:5px;justify-content:center;margin-bottom:6px}
.b{padding:8px 12px;border:2px solid #d4ecf7;border-radius:12px;background:#f0f8ff;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:12px;color:#4ba8e8;transition:all .15s}
.b:hover{background:#4ba8e8;color:#fff;border-color:#4ba8e8;transform:scale(1.05)}
.undo{padding:5px 12px;border:1.5px solid #ece8e2;border-radius:8px;background:#fff;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:10px;color:#9a958e;transition:all .15s}
.undo:hover{border-color:#e07a5f;color:#e07a5f}
.msg{font-size:11px;color:#9a958e;margin-top:5px;min-height:16px;font-style:italic}
.sep{width:1px;background:#ece8e2;align-self:stretch}
.status{font-size:10px;color:#6bbd7b;margin-top:8px;font-weight:600}
.ft{margin-top:12px;font-size:9px;color:#c5c0b8}
.loading{color:#9a958e;font-size:12px;padding:20px}
</style>
</head>
<body>
<div class="w">
<h2>Tracker d'Eau 💧</h2>
<div class="day" id="day"></div>
<div id="content"><div class="loading">Chargement...</div></div>
<div class="status" id="status"></div>
<div class="ft">🏰💕🐟 Nous Deux.</div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyDywRXlDSyFgI2BlmMCMXAMc2uZKUWJY54",
  authDomain:"notion-bdd.firebaseapp.com",
  projectId:"notion-bdd",
  storageBucket:"notion-bdd.firebasestorage.app",
  messagingSenderId:"641330827114",
  appId:"1:641330827114:web:0bf5fc986540a4c9085f13"
});
var db=firebase.firestore();
var now=new Date();var today=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');var docRef=db.collection('couple').doc('eau-'+today);
var goals={a:3.5,k:2.5};

document.getElementById('day').textContent=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});

function getMsg(v,g){
  var p=v/g;
  if(p<=0)return'';if(p<.25)return'Bien commencé !';if(p<.5)return'Continue 👍';
  if(p<.75)return'Plus de la moitié 💪';if(p<1)return'Presque 🔥';return'Objectif atteint 🏆';
}

function buildUI(data){
  var d=data||{a:0,k:0};
  var html='<div class="row">';
  [{w:'a',nm:'Alexandre',lc:'🇫🇷 La Rochelle',g:3.5},{w:'k',nm:'Klara',lc:'🇳🇨 N. Calédonie',g:2.5}].forEach(function(p,i){
    if(i===1)html+='<div class="sep"></div>';
    var v=d[p.w]||0;
    var pct=Math.min(100,Math.round((v/p.g)*100));
    html+='<div class="col"><div class="name">'+p.nm+'</div><div class="obj">Objectif : '+p.g+' L</div>';
    html+='<div class="glass-rim"></div><div class="glass"><div class="water" style="height:'+pct+'%"></div>';
    html+='<div class="pct">'+(pct>8?pct+'%':'')+'</div></div>';
    html+='<div class="lit">'+v.toFixed(2).replace('.',',')+' L</div>';
    html+='<div class="of">/ '+p.g+' L</div>';
    html+='<div class="btns">';
    html+='<button class="b" onclick="add(\''+p.w+'\',0.25)">🥤 25cl</button>';
    html+='<button class="b" onclick="add(\''+p.w+'\',0.5)">🧴 50cl</button>';
    html+='<button class="b" onclick="add(\''+p.w+'\',1)">🍶 1L</button>';
    html+='</div>';
    html+='<button class="undo" onclick="undo(\''+p.w+'\')">↩ Annuler</button>';
    html+='<div class="msg">'+getMsg(v,p.g)+'</div></div>';
  });
  html+='</div>';
  document.getElementById('content').innerHTML=html;
}

var lastValues={a:0,k:0};

function add(who,amt){
  docRef.get().then(function(doc){
    var d=doc.exists?doc.data():{a:0,k:0};
    lastValues[who]=d[who]||0;
    var update={};
    update[who]=Math.round(((d[who]||0)+amt)*100)/100;
    update['date']=today;
    return docRef.set(update,{merge:true});
  }).then(function(){
    document.getElementById('status').textContent='✅ Sauvegardé !';
    setTimeout(function(){document.getElementById('status').textContent=''},2000);
  });
}

function undo(who){
  var update={};
  update[who]=Math.max(0,lastValues[who]);
  docRef.set(update,{merge:true});
}

docRef.onSnapshot(function(doc){
  buildUI(doc.exists?doc.data():null);
});
</script>
</body>
</html>
