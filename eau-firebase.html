<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:#faf8f5;padding:14px}
.w{background:#fff;border-radius:22px;padding:24px;max-width:700px;margin:0 auto;box-shadow:0 4px 24px rgba(0,0,0,.05);border:1px solid #ece8e2;text-align:center;position:relative}
.settings{position:absolute;top:12px;right:14px;font-size:14px;color:#c5c0b8;text-decoration:none;cursor:pointer;transition:color .2s}
.settings:hover{color:#e07a5f}
h2{font-family:'Playfair Display',serif;font-size:19px;color:#2d2a26;margin-bottom:2px}
.day{font-size:11px;color:#b0ab9f;font-weight:600;margin-bottom:14px;text-transform:capitalize}
.row{display:flex;gap:20px}
.col{flex:1;min-width:0;text-align:center}
.name{font-size:14px;font-weight:700;color:#2d2a26;margin-bottom:1px}
.obj{font-size:10px;color:#b0ab9f;font-weight:600;margin-bottom:10px}
.glass-wrap{position:relative;width:90px;margin:0 auto 10px}
.glass-rim{width:100%;height:6px;background:linear-gradient(180deg,#c0d8ec,#a8c8e0);border-radius:4px 4px 2px 2px}
.glass{position:relative;width:82px;height:170px;margin:0 auto;border:3px solid #c0d8ec;border-top:none;border-radius:0 0 22px 22px;background:linear-gradient(180deg,#f5faff 0%,#e8f2fc 100%);overflow:hidden;box-shadow:inset 2px 0 6px rgba(0,0,0,.04),inset -2px 0 6px rgba(0,0,0,.04)}
.water{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(180deg,#8ed4f8 0%,#4ba8e8 50%,#2e87c8 100%);transition:height .8s cubic-bezier(.34,1.56,.64,1);border-radius:0 0 18px 18px;box-shadow:inset 0 4px 10px rgba(255,255,255,.3)}
.water::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:rgba(255,255,255,.5);border-radius:50%;animation:wave 3s ease-in-out infinite}
@keyframes wave{0%,100%{transform:translateX(-2px) scaleY(1)}50%{transform:translateX(2px) scaleY(1.5)}}
.pct{position:absolute;bottom:10px;left:0;right:0;font-family:'Playfair Display',serif;font-size:18px;font-weight:800;color:rgba(255,255,255,.95);text-shadow:0 1px 3px rgba(0,0,0,.25);z-index:2}
.lit{font-family:'Playfair Display',serif;font-size:26px;font-weight:800;color:#4ba8e8;margin-top:2px}
.of{font-size:11px;color:#9a958e;font-weight:600;margin-bottom:10px}
.btns{display:flex;gap:5px;justify-content:center;margin-bottom:6px;flex-wrap:wrap}
.b{padding:8px 12px;border:2px solid #d4ecf7;border-radius:12px;background:#f0f8ff;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:12px;color:#4ba8e8;transition:all .15s}
.b:hover{background:#4ba8e8;color:#fff;border-color:#4ba8e8;transform:scale(1.05)}
.undo{padding:5px 12px;border:1.5px solid #ece8e2;border-radius:8px;background:#fff;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:10px;color:#9a958e;transition:all .15s}
.undo:hover{border-color:#e07a5f;color:#e07a5f}
.msg{font-size:11px;color:#9a958e;margin-top:6px;min-height:16px;font-style:italic}
.sep{width:1px;background:#ece8e2;align-self:stretch}
.rst{font-size:9px;color:#c5c0b8;border:1.5px solid #f0ebe4;border-radius:8px;padding:4px 12px;background:#fff;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:600;margin-top:12px}
.rst:hover{color:#e07a5f;border-color:#e07a5f}
.status{font-size:10px;color:#6bbd7b;margin-top:6px;font-weight:600;min-height:14px}
.lastmaj{font-size:10px;color:#b0ab9f;margin-top:10px;font-style:italic}
.ft{margin-top:8px;font-size:9px;color:#c5c0b8}
</style>
</head>
<body>
<div class="w">
<a class="settings" href="https://ativollier-hash.github.io/notion-widgets/reset-center.html">⚙️</a>
<h2>Tracker d'Eau 💧</h2>
<div class="day" id="day"></div>
<div id="content"><div style="color:#9a958e;padding:20px">Chargement...</div></div>
<button class="rst" onclick="resetEau()">🔄 Reset ce widget</button>
<div class="status" id="status"></div>
<div class="lastmaj" id="lastmaj"></div>
<div class="ft">🏰💕🐟 Nous Deux.</div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyDywRXlDSyFgI2BlmMCMXAMc2uZKUWJY54",authDomain:"notion-bdd.firebaseapp.com",projectId:"notion-bdd",storageBucket:"notion-bdd.firebasestorage.app",messagingSenderId:"641330827114",appId:"1:641330827114:web:0bf5fc986540a4c9085f13"});
var db=firebase.firestore();
var docRef=db.collection('couple').doc('eau');

document.getElementById('day').textContent=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

function timeAgo(ts){
if(!ts)return'';
var diff=(Date.now()-ts)/1000;
if(diff<60)return'à l\'instant';
if(diff<3600)return'il y a '+Math.floor(diff/60)+' min';
if(diff<86400)return'il y a '+Math.floor(diff/3600)+'h';
return'il y a '+Math.floor(diff/86400)+' j';
}

function getMsg(v,g){
var p=v/g;
if(p<=0)return'';if(p<.25)return'Bien commencé ! 💧';if(p<.5)return'Continue 👍';
if(p<.75)return'Plus de la moitié 💪';if(p<1)return'Presque 🔥';return'Objectif atteint 🏆';
}

var cached=null;
function buildUI(data){
cached=data||{a:0,k:0};
var d=cached;
var html='<div class="row">';
[{w:'a',nm:'Alexandre',g:3.5},{w:'k',nm:'Klara',g:2.5}].forEach(function(p,i){
if(i===1)html+='<div class="sep"></div>';
var v=d[p.w]||0;
var pct=Math.min(100,Math.round((v/p.g)*100));
html+='<div class="col"><div class="name">'+p.nm+'</div><div class="obj">Objectif : '+p.g+' L</div>';
html+='<div class="glass-wrap"><div class="glass-rim"></div><div class="glass"><div class="water" style="height:'+pct+'%"></div>';
html+='<div class="pct">'+(pct>8?pct+'%':'')+'</div></div></div>';
html+='<div class="lit">'+v.toFixed(2).replace('.',',')+' L</div><div class="of">/ '+p.g+' L</div>';
html+='<div class="btns">';
html+='<button class="b" onclick="add(\''+p.w+'\',0.25)">🥤 25cl</button>';
html+='<button class="b" onclick="add(\''+p.w+'\',0.5)">🧴 50cl</button>';
html+='<button class="b" onclick="add(\''+p.w+'\',1)">🍶 1L</button></div>';
html+='<button class="undo" onclick="undo(\''+p.w+'\')">↩ Annuler</button>';
html+='<div class="msg">'+getMsg(v,p.g)+'</div></div>';
});
html+='</div>';
document.getElementById('content').innerHTML=html;
updateLastMaj();
}

function updateLastMaj(){
var d=cached||{};
var parts=[];
if(d.last_a)parts.push('🏰 '+timeAgo(d.last_a));
if(d.last_k)parts.push('🐟 '+timeAgo(d.last_k));
document.getElementById('lastmaj').textContent=parts.length?'Dernière MAJ : '+parts.join(' · '):'';
}

var lastValues={a:0,k:0};
function add(who,amt){
docRef.get().then(function(doc){
var d=doc.exists?doc.data():{a:0,k:0};
lastValues[who]=d[who]||0;
var update={};
update[who]=Math.round(((d[who]||0)+amt)*100)/100;
update['last_'+who]=Date.now();
return docRef.set(update,{merge:true});
}).then(function(){
document.getElementById('status').textContent='✅ Sauvegardé !';
setTimeout(function(){document.getElementById('status').textContent=''},1500);
});
}

function undo(who){
var u={};u[who]=Math.max(0,lastValues[who]);u['last_'+who]=Date.now();
docRef.set(u,{merge:true});
}

function resetEau(){
if(!confirm('Reset le Tracker d\'Eau ?'))return;
docRef.delete().then(function(){
document.getElementById('status').textContent='🔄 Reset !';
setTimeout(function(){document.getElementById('status').textContent=''},1500);
});
}

docRef.onSnapshot(function(doc){buildUI(doc.exists?doc.data():null)});
setInterval(updateLastMaj,60000);
</script>
</body>
</html>
