<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:#faf8f5;padding:14px}
.w{background:#fff;border-radius:22px;padding:24px;max-width:700px;margin:0 auto;box-shadow:0 4px 24px rgba(0,0,0,.05);border:1px solid #ece8e2;text-align:center;position:relative}
.settings{position:absolute;top:12px;right:14px;font-size:14px;color:#c5c0b8;text-decoration:none;cursor:pointer;transition:color .2s}
.settings:hover{color:#e07a5f}
h2{font-family:'Playfair Display',serif;font-size:19px;color:#2d2a26;margin-bottom:2px}
.day{font-size:11px;color:#b0ab9f;font-weight:600;margin-bottom:10px;text-transform:capitalize}
.info{font-size:12px;color:#9a958e;margin-bottom:12px;font-style:italic}
.who{display:flex;gap:8px;justify-content:center;margin-bottom:14px}
.wbtn{padding:8px 18px;border:2.5px solid #ece8e2;border-radius:12px;background:#fff;font-family:'Nunito',sans-serif;font-weight:700;font-size:12px;cursor:pointer;transition:all .15s;color:#2d2a26}
.wbtn:hover{border-color:#e07a5f;color:#e07a5f}
.wbtn.s{border-color:#e07a5f;background:#e07a5f;color:#fff}
.step-box{background:linear-gradient(135deg,#fff5f2,#fef9f0);border-radius:16px;padding:14px;margin-bottom:12px}
.step-label{font-size:11px;color:#9a958e;font-weight:600;margin-bottom:4px}
.step-title{font-family:'Playfair Display',serif;font-size:16px;color:#2d2a26}
.input-area{margin:10px 0}
.input-area input{padding:12px 16px;border:1.5px solid #ece8e2;border-radius:12px;font-family:'Playfair Display',serif;font-size:24px;font-weight:800;color:#2d2a26;background:#faf8f5;outline:none;width:120px;text-align:center}
.input-area input:focus{border-color:#e07a5f}
.input-area button{padding:12px 24px;border:none;border-radius:12px;background:#e07a5f;color:#fff;font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;cursor:pointer;margin-left:8px}
.input-area button:hover{background:#c9694f}
.hint{padding:12px;border-radius:12px;margin:10px auto;max-width:300px;font-weight:700;font-size:14px;display:none}
.hint.v{display:block;animation:fi .4s ease}
.hint.up{background:rgba(224,122,95,.08);color:#e07a5f}
.hint.down{background:rgba(75,168,232,.08);color:#4ba8e8}
.hint.win{background:linear-gradient(135deg,#f0faf2,#e8f5e9);color:#2d8a4e;font-size:16px}
.history{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:10px 0}
.htry{padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700}
.htry.up{background:rgba(224,122,95,.08);color:#e07a5f}
.htry.down{background:rgba(75,168,232,.08);color:#4ba8e8}
.htry.win{background:rgba(107,189,123,.1);color:#2d8a4e}
.attempts{font-size:12px;color:#9a958e;font-weight:600;margin:6px 0}
.players{display:flex;gap:20px;justify-content:center;margin:10px 0}
.player{text-align:center;min-width:80px}
.player .nm{font-size:11px;font-weight:700;color:#2d2a26}
.player .st{font-size:14px;margin-top:2px;color:#9a958e}
.score-box{display:flex;gap:16px;justify-content:center;margin:10px 0;align-items:center}
.sc{text-align:center;padding:10px 16px;background:#faf8f5;border-radius:12px;min-width:70px}
.sc .sv{font-family:'Playfair Display',serif;font-size:20px;font-weight:800;color:#e07a5f}
.sc .sl{font-size:10px;color:#9a958e;font-weight:600;margin-top:2px}
.vs{font-size:14px;color:#c5c0b8;font-family:'Playfair Display',serif}
.btn-row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:10px}
.btn{padding:8px 18px;border:2px solid #ece8e2;border-radius:10px;background:#fff;font-family:'Nunito',sans-serif;font-weight:700;font-size:11px;cursor:pointer;transition:all .15s;color:#2d2a26}
.btn:hover{border-color:#e07a5f;color:#e07a5f}
.btn.primary{background:#e07a5f;color:#fff;border-color:#e07a5f}
.btn.primary:hover{background:#c9694f}
.rst{font-size:9px;color:#c5c0b8;border:1.5px solid #f0ebe4;border-radius:8px;padding:4px 12px;background:#fff;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:600;margin-top:6px}
.rst:hover{color:#e07a5f;border-color:#e07a5f}
.status{font-size:10px;color:#6bbd7b;margin-top:6px;font-weight:600;min-height:14px}
.lastmaj{font-size:10px;color:#b0ab9f;margin-top:10px;font-style:italic}
.ft{margin-top:8px;font-size:9px;color:#c5c0b8}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="w">
<a class="settings" href="https://ativollier-hash.github.io/notion-widgets/reset-center.html">⚙️</a>
<h2>Plus ou Moins 🔢</h2>
<div class="day" id="day"></div>
<div class="info" id="info">Chacun choisit un nombre pour l'autre !</div>
<div class="who">
<button class="wbtn" id="wa" onclick="toggleWho('a')">🏰 Alexandre</button>
<button class="wbtn" id="wk" onclick="toggleWho('k')">🐟 Klara</button>
</div>
<div id="zone"></div>
<div class="btn-row">
<button class="btn primary" onclick="newGame()">🔄 Nouvelle partie</button>
<button class="rst" onclick="resetScore()">Reset scores</button>
</div>
<div class="status" id="status"></div>
<div class="lastmaj" id="lastmaj"></div>
<div class="ft">🏰💕🐟 Nous Deux.</div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyDywRXlDSyFgI2BlmMCMXAMc2uZKUWJY54",authDomain:"notion-bdd.firebaseapp.com",projectId:"notion-bdd",storageBucket:"notion-bdd.firebasestorage.app",messagingSenderId:"641330827114",appId:"1:641330827114:web:0bf5fc986540a4c9085f13"});
var db=firebase.firestore(),me=null;
var docRef=db.collection('couple').doc('pom');
var scoreRef=db.collection('couple').doc('pom-score');

document.getElementById('day').textContent=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

function timeAgo(ts){
if(!ts)return'';
var diff=(Date.now()-ts)/1000;
if(diff<60)return'à l\'instant';
if(diff<3600)return'il y a '+Math.floor(diff/60)+' min';
if(diff<86400)return'il y a '+Math.floor(diff/3600)+'h';
return'il y a '+Math.floor(diff/86400)+' j';
}

function toggleWho(w){me=me===w?null:w;
document.getElementById('wa').className='wbtn'+(me==='a'?' s':'');
document.getElementById('wk').className='wbtn'+(me==='k'?' s':'');
render();}

function nm(w){return w==='a'?'🏰 Alexandre':'🐟 Klara'}
function other(){return me==='a'?'k':'a'}

var cached=null,cachedScore=null;
function buildUI(d,sc){cached=d||{};cachedScore=sc||{a:0,k:0};render();updateLastMaj();}

function render(){
var d=cached||{};
var sc=cachedScore||{a:0,k:0};
var o=me?other():null;
var html='';

html+='<div class="score-box">';
html+='<div class="sc"><div class="sv">'+(sc.a||0)+'</div><div class="sl">🏰 Alexandre</div></div>';
html+='<div class="vs">VS</div>';
html+='<div class="sc"><div class="sv">'+(sc.k||0)+'</div><div class="sl">🐟 Klara</div></div>';
html+='</div>';

var bothFound=d.found_a&&d.found_k;

if(bothFound){
  html+='<div class="hint v win">🎉 Partie terminée !</div>';
  html+='<div class="players">';
  ['a','k'].forEach(function(w){
    html+='<div class="player"><div class="nm">'+nm(w)+'</div>';
    html+='<div class="st">A trouvé <b>'+d['secret_for_'+w]+'</b> en <b>'+(d['att_'+w]?d['att_'+w].length:'?')+'</b> essais</div></div>';
  });
  html+='</div>';
  document.getElementById('zone').innerHTML=html;return;
}

if(!me){
  html+='<div style="color:#9a958e;padding:16px">Sélectionne ton nom pour jouer ↑</div>';
  document.getElementById('zone').innerHTML=html;return;
}

if(!d['secret_for_'+o]){
  html+='<div class="step-box"><div class="step-label">Étape 1</div><div class="step-title">Choisis un nombre (1-100) que '+nm(o)+' devra deviner</div></div>';
  html+='<div class="input-area"><input type="number" id="numIn" min="1" max="100" placeholder="?" onkeydown="if(event.key===\'Enter\')sendNumber()"><button onclick="sendNumber()">Valider</button></div>';
}
else if(!d['secret_for_'+me]){
  html+='<div class="step-box"><div class="step-title">✅ Nombre envoyé ! En attente que '+nm(o)+' choisisse un nombre pour toi...</div></div>';
}
else if(!d['found_'+me]){
  var att=d['att_'+me]||[];
  var lastHint=d['hint_'+me];
  html+='<div class="step-box"><div class="step-label">Étape 2</div><div class="step-title">Devine le nombre de '+nm(o)+' !</div></div>';
  if(lastHint){
    html+='<div class="hint v '+(lastHint==='up'?'up':'down')+'">'+(lastHint==='up'?'⬆️ C\'est PLUS !':'⬇️ C\'est MOINS !')+'</div>';
  }
  html+='<div class="input-area"><input type="number" id="guessIn" min="1" max="100" placeholder="?" onkeydown="if(event.key===\'Enter\')sendGuess()"><button onclick="sendGuess()">Deviner</button></div>';
  html+='<div class="attempts">'+att.length+' essai(s)</div>';
  if(att.length>0){
    html+='<div class="history">';
    att.forEach(function(a){
      var secret=d['secret_for_'+me];
      var cls=a===secret?'win':a<secret?'up':'down';
      html+='<div class="htry '+cls+'">'+a+(cls==='win'?' ✓':cls==='up'?' ⬆':' ⬇')+'</div>';
    });
    html+='</div>';
  }
}
else{
  html+='<div class="hint v win">🎉 Tu as trouvé '+d['secret_for_'+me]+' en '+(d['att_'+me]?d['att_'+me].length:'?')+' essais !</div>';
  html+='<div style="color:#9a958e;font-size:12px;padding:8px">En attente de '+nm(o)+'...</div>';
}

html+='<div class="players">';
['a','k'].forEach(function(w){
  html+='<div class="player"><div class="nm">'+nm(w)+'</div>';
  if(d['found_'+w])html+='<div class="st">✅ Trouvé en '+(d['att_'+w]?d['att_'+w].length:'?')+' essais</div>';
  else if(d['secret_for_'+w])html+='<div class="st">⏳ En train de deviner...</div>';
  else html+='<div class="st">⏳ Choisit un nombre...</div>';
  html+='</div>';
});
html+='</div>';
document.getElementById('zone').innerHTML=html;
}

function sendNumber(){
var el=document.getElementById('numIn');if(!el)return;
var n=parseInt(el.value);if(isNaN(n)||n<1||n>100)return;
var o=other();
var u={};u['secret_for_'+o]=n;u['last_'+me]=Date.now();
docRef.set(u,{merge:true}).then(function(){
  me=null;document.getElementById('wa').className='wbtn';document.getElementById('wk').className='wbtn';
  document.getElementById('info').textContent='Nombre envoyé !';
  showSt();
});}

function sendGuess(){
var el=document.getElementById('guessIn');if(!el)return;
var g=parseInt(el.value);if(isNaN(g)||g<1||g>100)return;
docRef.get().then(function(doc){
  var d=doc.exists?doc.data():{};
  if(d['found_'+me])return;
  var secret=d['secret_for_'+me];
  if(!secret)return;
  var att=d['att_'+me]||[];
  att.push(g);
  var found=g===secret;
  var hint=g<secret?'up':'down';
  var u={};
  u['att_'+me]=att;
  u['hint_'+me]=found?null:hint;
  u['found_'+me]=found;
  u['last_'+me]=Date.now();
  return docRef.set(u,{merge:true}).then(function(){
    if(found){
      scoreRef.get().then(function(s){
        var sd=s.exists?s.data():{a:0,k:0};
        var su={};su[me]=(sd[me]||0)+1;
        scoreRef.set(su,{merge:true});
      });
    }
  });
}).then(showSt);}

function newGame(){
if(!confirm('Nouvelle partie ? (efface la partie en cours)'))return;
docRef.delete().then(function(){
me=null;document.getElementById('wa').className='wbtn';document.getElementById('wk').className='wbtn';
document.getElementById('info').textContent='Chacun choisit un nombre pour l\'autre !';
document.getElementById('status').textContent='🔄 Nouvelle partie !';
setTimeout(function(){document.getElementById('status').textContent=''},1500);});}

function resetScore(){
if(!confirm('Reset les scores ? (victoires remises à 0)'))return;
scoreRef.delete().then(function(){
document.getElementById('status').textContent='🔄 Scores reset !';
setTimeout(function(){document.getElementById('status').textContent=''},1500);});}

function showSt(){document.getElementById('status').textContent='✅ Envoyé !';
setTimeout(function(){document.getElementById('status').textContent=''},1500)}

function updateLastMaj(){
var d=cached||{};
var parts=[];
if(d.last_a)parts.push('🏰 '+timeAgo(d.last_a));
if(d.last_k)parts.push('🐟 '+timeAgo(d.last_k));
document.getElementById('lastmaj').textContent=parts.length?'Dernière MAJ : '+parts.join(' · '):'';
}

var unsub1=null,unsub2=null;
unsub1=docRef.onSnapshot(function(doc){cached=doc.exists?doc.data():null;render();updateLastMaj();});
unsub2=scoreRef.onSnapshot(function(doc){cachedScore=doc.exists?doc.data():null;render();});
setInterval(updateLastMaj,60000);
</script>
</body>
</html>
