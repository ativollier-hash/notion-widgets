<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:#faf8f5;padding:14px}
.w{background:#fff;border-radius:22px;padding:24px;max-width:700px;margin:0 auto;box-shadow:0 4px 24px rgba(0,0,0,.05);border:1px solid #ece8e2;text-align:center}
h2{font-family:'Playfair Display',serif;font-size:18px;color:#2d2a26;margin-bottom:4px}
.day{font-size:11px;color:#b0ab9f;font-weight:600;margin-bottom:10px}
.info{font-size:12px;color:#9a958e;margin-bottom:12px;font-style:italic}
.who{display:flex;gap:8px;justify-content:center;margin-bottom:14px}
.wbtn{padding:10px 22px;border:2.5px solid #ece8e2;border-radius:14px;background:#fff;font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all .15s;color:#2d2a26}
.wbtn:hover{border-color:#e07a5f;color:#e07a5f}

.qbox{background:linear-gradient(135deg,#fff5f2,#fef9f0);border-radius:18px;padding:22px 20px;margin-bottom:14px;position:relative;overflow:hidden}
.qbox::before{content:'💭';position:absolute;top:-6px;right:-2px;font-size:50px;opacity:.08}
.cat{display:inline-block;background:#e07a5f;color:#fff;font-size:10px;font-weight:700;padding:3px 12px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.q{font-family:'Playfair Display',serif;font-size:18px;color:#2d2a26;line-height:1.4}
.qnum{font-size:10px;color:#c5c0b8;margin-top:6px}
.ansbox{margin:12px auto;max-width:460px;display:none}
.ansbox.v{display:block;animation:fi .3s ease}
.ansbox label{font-size:11px;color:#9a958e;font-weight:600;display:block;margin-bottom:4px;text-align:left}
.ansbox textarea{width:100%;padding:10px 12px;border:1.5px solid #ece8e2;border-radius:12px;font-family:'Nunito',sans-serif;font-size:13px;color:#2d2a26;background:#faf8f5;resize:none;outline:none;min-height:50px}
.ansbox textarea:focus{border-color:#e07a5f}
.validate{margin-top:8px;padding:10px 28px;border:none;border-radius:12px;background:#e07a5f;color:#fff;font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all .2s;display:none}
.validate.v{display:inline-block}
.validate:hover{background:#c9694f;transform:translateY(-1px)}
.players{display:flex;gap:20px;justify-content:center;margin:12px 0}
.player{text-align:center;min-width:80px}
.player .nm{font-size:11px;font-weight:700;color:#2d2a26}
.player .st{font-size:18px;margin-top:2px;min-height:24px}
.player .wait{font-size:10px;color:#b0ab9f;font-style:italic}
.answers{margin:8px auto;max-width:520px;text-align:left;display:none}
.answers.v{display:block;animation:fi .4s ease}
.abubble{padding:12px 14px;background:#faf8f5;border-radius:14px;margin-bottom:8px;font-size:13px;color:#2d2a26;line-height:1.4}
.abubble b{color:#e07a5f}
.reveal{padding:14px;border-radius:14px;background:linear-gradient(135deg,#f0faf2,#e8f5e9);margin-bottom:10px;display:none}
.reveal.v{display:block;animation:fi .5s ease}
.reveal .rtxt{font-family:'Playfair Display',serif;font-size:16px;color:#2d2a26}
.nav{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:10px}
.btn{padding:7px 16px;border:2px solid #ece8e2;border-radius:10px;background:#fff;font-family:'Nunito',sans-serif;font-weight:700;font-size:11px;cursor:pointer;transition:all .15s;color:#2d2a26}
.btn:hover{border-color:#e07a5f;color:#e07a5f}
.rst{font-size:9px;color:#c5c0b8;border-color:#f0ebe4;margin-top:6px}
.rst:hover{color:#e07a5f;border-color:#e07a5f}
.status{font-size:10px;color:#6bbd7b;margin-top:6px;font-weight:600}
.ft{margin-top:10px;font-size:9px;color:#c5c0b8}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

var me=null,idx=0;
document.getElementById('day').textContent=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
idx=Math.floor((new Date()-new Date(new Date().getFullYear(),0,0))/(1000*60*60*24))%qs.length;

function toggleWho(w){me=me===w?null:w;
document.getElementById('wa').className='wbtn'+(me==='a'?' s':'');
document.getElementById('wk').className='wbtn'+(me==='k'?' s':'');
document.getElementById('info').textContent=me?'Réponds à la question ↓':'Choisis ton nom';
listenQ();}

function deselect(){me=null;
document.getElementById('wa').className='wbtn';
document.getElementById('wk').className='wbtn';
document.getElementById('info').textContent='Réponse envoyée !';}

function getRef(){return db.collection('couple').doc('qdj-'+idx)}

function buildUI(data){
var d=data||{};
var q=qs[idx];
var both=d.ans_a&&d.ans_k;
var canAnswer=me&&!d['ans_'+me];
var html='<div class="qbox"><div class="cat">'+q[0]+'</div><div class="q">'+q[1]+'</div>';
html+='<div class="qnum">Question '+(idx+1)+' / '+qs.length+'</div></div>';

html+='<div class="players">';
[{w:'a',nm:'Alexandre',ic:'🏰'},{w:'k',nm:'Klara',ic:'🐟'}].forEach(function(p){
  html+='<div class="player"><div class="nm">'+p.ic+' '+p.nm+'</div>';
  if(d['ans_'+p.w]){html+='<div class="st">✅</div>'}
  else{html+='<div class="wait">En attente...</div>'}
  html+='</div>';
});
html+='</div>';

if(canAnswer){
  html+='<div class="ansbox v"><label>Ta réponse :</label>';
  html+='<textarea id="ansIn" placeholder="Écris ta réponse..."></textarea></div>';
  html+='<button class="validate v" onclick="validate()">Valider ✓</button>';
}

if(both){
  html+='<div class="reveal v"><div class="rtxt">🎉 Les deux ont répondu !</div></div>';
  html+='<div class="answers v">';
  if(d.ans_a)html+='<div class="abubble"><b>🏰 Alexandre :</b> '+d.ans_a+'</div>';
  if(d.ans_k)html+='<div class="abubble"><b>🐟 Klara :</b> '+d.ans_k+'</div>';
  html+='</div>';
}

html+='<div class="nav">';
html+='<button class="btn" onclick="nav(-1)">←</button>';
html+='<button class="btn" onclick="rand()">🎲 Aléatoire</button>';
html+='<button class="btn" onclick="nav(1)">→</button>';
html+='</div>';
html+='<button class="btn rst" onclick="resetQ()">🔄 Reset</button>';

document.getElementById('zone').innerHTML=html;
}

function validate(){
if(!me)return;
var el=document.getElementById('ansIn');
if(!el||!el.value.trim())return;
var u={};u['ans_'+me]=el.value.trim();u['q']=idx;
getRef().set(u,{merge:true}).then(function(){
  document.getElementById('status').textContent='✅ Réponse envoyée !';
  deselect();
  setTimeout(function(){document.getElementById('status').textContent=''},2000);
});
}

function resetQ(){getRef().delete().then(function(){
  document.getElementById('status').textContent='🔄 Reset !';
  setTimeout(function(){document.getElementById('status').textContent=''},1500);
})}

function nav(d){idx=((idx+d)%qs.length+qs.length)%qs.length;listenQ()}
function rand(){idx=Math.floor(Math.random()*qs.length);listenQ()}

var unsub=null;
function listenQ(){if(unsub)unsub();
unsub=getRef().onSnapshot(function(doc){buildUI(doc.exists?doc.data():null)})}
listenQ();
</script>
