<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:#faf8f5;padding:14px}
.w{background:#fff;border-radius:22px;padding:24px;max-width:700px;margin:0 auto;box-shadow:0 4px 24px rgba(0,0,0,.05);border:1px solid #ece8e2;text-align:center}
h2{font-family:'Playfair Display',serif;font-size:18px;color:#2d2a26;margin-bottom:4px}
.day{font-size:11px;color:#b0ab9f;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.row{display:flex;gap:20px;align-items:flex-start}
.col{flex:1;min-width:0}
.name{font-size:14px;font-weight:700;color:#2d2a26;margin-bottom:2px}
.lc{font-size:10px;color:#b0ab9f;font-weight:600;margin-bottom:10px}
.opts{display:flex;flex-direction:column;gap:6px}
.opt{padding:12px;border:2.5px solid #ece8e2;border-radius:14px;background:#faf8f5;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:10px;text-align:left}
.opt:hover{border-color:#e07a5f;transform:translateY(-1px)}
.opt.s{border-color:#e07a5f;background:rgba(224,122,95,.08);box-shadow:0 2px 12px rgba(224,122,95,.15)}
.opt .icon{font-size:24px;flex-shrink:0}
.opt .txt{font-size:13px;font-weight:700;color:#2d2a26}
.opt .sub{font-size:10px;color:#9a958e;font-weight:600;margin-top:1px}
.opt.repos{border-style:dashed}
.opt.repos.s{background:rgba(107,189,123,.08);border-color:#6bbd7b;border-style:solid}
.sep{width:1px;background:#ece8e2;align-self:stretch}
.status{font-size:10px;color:#6bbd7b;margin-top:10px;font-weight:600}
.recap{margin-top:14px;padding:14px;background:linear-gradient(135deg,#fff5f2,#fef9f0);border-radius:14px;display:none}
.recap.v{display:block;animation:fi .4s ease}
.recap-txt{font-family:'Playfair Display',serif;font-size:16px;color:#2d2a26}
.recap-sub{font-size:11px;color:#9a958e;margin-top:4px}
.ft{margin-top:12px;font-size:9px;color:#c5c0b8}
.loading{color:#9a958e;font-size:12px;padding:20px}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="w">
<h2>Sport du Jour 💪</h2>
<div class="day" id="day"></div>
<div id="content"><div class="loading">Chargement...</div></div>
<div class="recap" id="recap"><div class="recap-txt" id="rtxt"></div><div class="recap-sub" id="rsub"></div></div>
<div class="status" id="status"></div>
<div class="ft">🏰💕🐟 Nous Deux.</div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyDywRXlDSyFgI2BlmMCMXAMc2uZKUWJY54",
  authDomain:"notion-bdd.firebaseapp.com",
  projectId:"notion-bdd",
  storageBucket:"notion-bdd.firebasestorage.app",
  messagingSenderId:"641330827114",
  appId:"1:641330827114:web:0bf5fc986540a4c9085f13"
});
var db=firebase.firestore();
var now=new Date();var today=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');var docRef=db.collection('couple').doc('sport-'+today);

var workouts=[
  {id:'legs',icon:'🦵',txt:'Legs',sub:'Squats, presse, fentes, mollets'},
  {id:'dos',icon:'🔙',txt:'Dos / Biceps',sub:'Tractions, rowing, curl'},
  {id:'pecs',icon:'💪',txt:'Pecs / Triceps',sub:'Développé couché, dips, poulie'},
  {id:'epaules',icon:'🏋️',txt:'Épaules',sub:'Développé militaire, élévations'},
  {id:'cardio',icon:'🏃',txt:'Cardio',sub:'Course, vélo, natation, HIIT'},
  {id:'repos',icon:'😴',txt:'Repos',sub:'Récupération, stretching'}
];

document.getElementById('day').textContent=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});

function buildUI(data){
  var d=data||{a:null,k:null};
  var html='<div class="row">';
  [{w:'a',nm:'Alexandre',lc:'🇫🇷 La Rochelle'},{w:'k',nm:'Klara',lc:'🇳🇨 N. Calédonie'}].forEach(function(p,i){
    if(i===1)html+='<div class="sep"></div>';
    html+='<div class="col"><div class="name">'+p.nm+'</div><div class="lc">'+p.lc+'</div><div class="opts">';
    workouts.forEach(function(wo){
      var sel=d[p.w]===wo.id?' s':'';
      var cls=wo.id==='repos'?' repos':'';
      html+='<div class="opt'+cls+sel+'" onclick="pick(\''+p.w+'\',\''+wo.id+'\')">';
      html+='<span class="icon">'+wo.icon+'</span><div><div class="txt">'+wo.txt+'</div><div class="sub">'+wo.sub+'</div></div></div>';
    });
    html+='</div></div>';
  });
  html+='</div>';
  document.getElementById('content').innerHTML=html;

  var rc=document.getElementById('recap');
  if(d.a&&d.k){
    var aw=workouts.find(function(x){return x.id===d.a});
    var kw=workouts.find(function(x){return x.id===d.k});
    document.getElementById('rtxt').textContent=(aw?aw.icon+' '+aw.txt:'…')+' × '+(kw?kw.icon+' '+kw.txt:'…');
    document.getElementById('rsub').textContent='Aujourd\'hui on se dépasse ensemble !';
    rc.classList.add('v');
  } else if(d.a||d.k){
    var who=d.a?'Alexandre':'Klara';
    var ww=workouts.find(function(x){return x.id===(d.a||d.k)});
    document.getElementById('rtxt').textContent=who+' : '+(ww?ww.icon+' '+ww.txt:'…');
    document.getElementById('rsub').textContent='En attente de l\'autre...';
    rc.classList.add('v');
  } else {
    rc.classList.remove('v');
  }
}

function pick(who,id){
  var update={};
  update[who]=id;
  update['date']=today;
  docRef.set(update,{merge:true}).then(function(){
    document.getElementById('status').textContent='✅ Sauvegardé !';
    setTimeout(function(){document.getElementById('status').textContent=''},2000);
  });
}

docRef.onSnapshot(function(doc){
  buildUI(doc.exists?doc.data():null);
});
</script>
</body>
</html>
