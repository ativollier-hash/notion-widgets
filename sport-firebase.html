<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:#faf8f5;padding:14px}
.w{background:#fff;border-radius:22px;padding:24px;max-width:800px;margin:0 auto;box-shadow:0 4px 24px rgba(0,0,0,.05);border:1px solid #ece8e2;text-align:center;position:relative}
.settings{position:absolute;top:12px;right:14px;font-size:14px;color:#c5c0b8;text-decoration:none;cursor:pointer;transition:color .2s}
.settings:hover{color:#e07a5f}
h2{font-family:'Playfair Display',serif;font-size:19px;color:#2d2a26;margin-bottom:2px}
.day{font-size:11px;color:#b0ab9f;font-weight:600;margin-bottom:14px;text-transform:capitalize}
.who{display:flex;gap:8px;justify-content:center;margin-bottom:16px}
.wbtn{padding:8px 18px;border:2.5px solid #ece8e2;border-radius:12px;background:#fff;font-family:'Nunito',sans-serif;font-weight:700;font-size:12px;cursor:pointer;transition:all .15s;color:#2d2a26}
.wbtn:hover{border-color:#e07a5f;color:#e07a5f}
.wbtn.s{border-color:#e07a5f;background:#e07a5f;color:#fff}
.week{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:16px}
.d-col{background:#faf8f5;border-radius:12px;padding:8px 4px;border:1.5px solid #ece8e2;transition:border .15s}
.d-col.today{border-color:#e07a5f;background:rgba(224,122,95,.04)}
.d-col.active{border-color:#e07a5f;background:rgba(224,122,95,.08);box-shadow:0 2px 8px rgba(224,122,95,.12)}
.d-label{font-size:10px;font-weight:700;color:#9a958e;text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px;cursor:pointer}
.d-col.today .d-label{color:#e07a5f}
.d-content{min-height:40px;display:flex;flex-direction:column;gap:2px;cursor:pointer}
.d-tag{font-size:14px;padding:2px 0}
.d-empty{font-size:10px;color:#c5c0b8;font-style:italic;padding:4px}
.picker{background:linear-gradient(135deg,#fff5f2,#fef9f0);border-radius:14px;padding:14px;margin-bottom:14px;display:none;animation:fi .3s ease}
.picker.v{display:block}
.picker-title{font-family:'Playfair Display',serif;font-size:14px;color:#2d2a26;margin-bottom:10px}
.picker-opts{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.p-opt{padding:8px 12px;border:2px solid #ece8e2;border-radius:10px;background:#fff;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:11px;color:#2d2a26;transition:all .15s;display:flex;align-items:center;gap:6px}
.p-opt:hover{border-color:#e07a5f;color:#e07a5f}
.p-opt.s{border-color:#e07a5f;background:#e07a5f;color:#fff}
.p-opt .emj{font-size:14px}
.picker-close{margin-top:10px;padding:6px 14px;border:1.5px solid #ece8e2;border-radius:10px;background:#fff;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:11px;color:#9a958e}
.picker-close:hover{color:#e07a5f;border-color:#e07a5f}
.info{font-size:11px;color:#9a958e;margin-bottom:10px;font-style:italic}
.rst{font-size:9px;color:#c5c0b8;border:1.5px solid #f0ebe4;border-radius:8px;padding:4px 12px;background:#fff;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:600;margin-top:10px}
.rst:hover{color:#e07a5f;border-color:#e07a5f}
.status{font-size:10px;color:#6bbd7b;margin-top:6px;font-weight:600;min-height:14px}
.lastmaj{font-size:10px;color:#b0ab9f;margin-top:10px;font-style:italic}
.ft{margin-top:8px;font-size:9px;color:#c5c0b8}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="w">
<a class="settings" href="https://ativollier-hash.github.io/notion-widgets/reset-center.html">⚙️</a>
<h2>Planning Sport 💪</h2>
<div class="day" id="day"></div>
<div class="who">
<button class="wbtn" id="wa" onclick="toggleWho('a')">🏰 Alexandre</button>
<button class="wbtn" id="wk" onclick="toggleWho('k')">🐟 Klara</button>
</div>
<div id="info" class="info">Sélectionne ton nom puis clique sur un jour pour remplir</div>
<div id="weekZone"></div>
<div id="picker" class="picker"></div>
<button class="rst" onclick="resetSport()">🔄 Reset mes séances</button>
<div class="status" id="status"></div>
<div class="lastmaj" id="lastmaj"></div>
<div class="ft">🏰💕🐟 Nous Deux.</div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyDywRXlDSyFgI2BlmMCMXAMc2uZKUWJY54",authDomain:"notion-bdd.firebaseapp.com",projectId:"notion-bdd",storageBucket:"notion-bdd.firebasestorage.app",messagingSenderId:"641330827114",appId:"1:641330827114:web:0bf5fc986540a4c9085f13"});
var db=firebase.firestore();
var docRef=db.collection('couple').doc('sport');
var me=null,activeDay=null;

var days=[{id:'lun',lbl:'Lun'},{id:'mar',lbl:'Mar'},{id:'mer',lbl:'Mer'},{id:'jeu',lbl:'Jeu'},{id:'ven',lbl:'Ven'},{id:'sam',lbl:'Sam'},{id:'dim',lbl:'Dim'}];
var workouts=[
{id:'legs',icon:'🦵',txt:'Legs'},
{id:'dos',icon:'🔙',txt:'Dos/Biceps'},
{id:'pecs',icon:'💪',txt:'Pecs/Triceps'},
{id:'epaules',icon:'🏋️',txt:'Épaules'},
{id:'cardio',icon:'🏃',txt:'Cardio'},
{id:'abdos',icon:'🔥',txt:'Abdos'},
{id:'yoga',icon:'🧘',txt:'Yoga'},
{id:'nat',icon:'🏊',txt:'Natation'},
{id:'velo',icon:'🚴',txt:'Vélo'},
{id:'repos',icon:'😴',txt:'Repos'}
];

document.getElementById('day').textContent=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

function getTodayId(){
var d=new Date().getDay();
return['dim','lun','mar','mer','jeu','ven','sam'][d];
}

function timeAgo(ts){
if(!ts)return'';
var diff=(Date.now()-ts)/1000;
if(diff<60)return'à l\'instant';
if(diff<3600)return'il y a '+Math.floor(diff/60)+' min';
if(diff<86400)return'il y a '+Math.floor(diff/3600)+'h';
return'il y a '+Math.floor(diff/86400)+' j';
}

function toggleWho(w){
me=me===w?null:w;
activeDay=null;
document.getElementById('wa').className='wbtn'+(me==='a'?' s':'');
document.getElementById('wk').className='wbtn'+(me==='k'?' s':'');
document.getElementById('info').textContent=me?'Clique sur un jour pour remplir tes séances':'Sélectionne ton nom puis clique sur un jour';
render();
}

var cached=null;
function buildUI(d){cached=d||{};render();updateLastMaj();}

function getDayData(who,dayId){
var d=cached||{};
var key=who+'_'+dayId;
return d[key]||[];
}

function render(){
var html='<div class="week">';
var today=getTodayId();
days.forEach(function(day){
var cls='d-col';
if(day.id===today)cls+=' today';
if(activeDay===day.id)cls+=' active';
html+='<div class="'+cls+'">';
html+='<div class="d-label" onclick="openPicker(\''+day.id+'\')">'+day.lbl+'</div>';
html+='<div class="d-content" onclick="openPicker(\''+day.id+'\')">';

if(me){
var myData=getDayData(me,day.id);
if(myData.length){
myData.forEach(function(id){
var w=workouts.find(function(x){return x.id===id});
if(w)html+='<div class="d-tag">'+w.icon+'</div>';
});
}else{html+='<div class="d-empty">—</div>';}
}else{
// Show combined view when no one selected
var aData=getDayData('a',day.id);
var kData=getDayData('k',day.id);
if(aData.length||kData.length){
if(aData.length){
html+='<div style="font-size:9px;color:#e07a5f;font-weight:700">🏰</div>';
aData.forEach(function(id){var w=workouts.find(function(x){return x.id===id});if(w)html+='<div class="d-tag">'+w.icon+'</div>'});
}
if(kData.length){
html+='<div style="font-size:9px;color:#4ba8e8;font-weight:700;margin-top:2px">🐟</div>';
kData.forEach(function(id){var w=workouts.find(function(x){return x.id===id});if(w)html+='<div class="d-tag">'+w.icon+'</div>'});
}
}else{html+='<div class="d-empty">—</div>';}
}
html+='</div></div>';
});
html+='</div>';
document.getElementById('weekZone').innerHTML=html;

// Picker
var picker=document.getElementById('picker');
if(me&&activeDay){
var dayObj=days.find(function(x){return x.id===activeDay});
var selected=getDayData(me,activeDay);
var pHtml='<div class="picker-title">Séances du '+dayObj.lbl+'</div>';
pHtml+='<div class="picker-opts">';
workouts.forEach(function(wo){
var isSel=selected.indexOf(wo.id)>=0;
pHtml+='<div class="p-opt'+(isSel?' s':'')+'" onclick="toggleWorkout(\''+wo.id+'\')"><span class="emj">'+wo.icon+'</span>'+wo.txt+'</div>';
});
pHtml+='</div><button class="picker-close" onclick="closePicker()">Fermer</button>';
picker.innerHTML=pHtml;
picker.classList.add('v');
}else{picker.classList.remove('v')}
}

function openPicker(dayId){
if(!me){document.getElementById('info').textContent='👆 Sélectionne ton nom d\'abord !';return}
activeDay=activeDay===dayId?null:dayId;
render();
}

function closePicker(){activeDay=null;render();}

function toggleWorkout(woId){
if(!me||!activeDay)return;
var key=me+'_'+activeDay;
var current=getDayData(me,activeDay).slice();
var idx=current.indexOf(woId);
if(idx>=0)current.splice(idx,1);
else current.push(woId);
var u={};
u[key]=current;
u['last_'+me]=Date.now();
docRef.set(u,{merge:true}).then(function(){
document.getElementById('status').textContent='✅ Sauvegardé !';
setTimeout(function(){document.getElementById('status').textContent=''},1500);
});
}

function updateLastMaj(){
var d=cached||{};
var parts=[];
if(d.last_a)parts.push('🏰 '+timeAgo(d.last_a));
if(d.last_k)parts.push('🐟 '+timeAgo(d.last_k));
document.getElementById('lastmaj').textContent=parts.length?'Dernière MAJ : '+parts.join(' · '):'';
}

function resetSport(){
if(!me){document.getElementById('status').textContent='⚠️ Sélectionne ton nom';setTimeout(function(){document.getElementById('status').textContent=''},2000);return}
if(!confirm('Reset TES séances de la semaine ?'))return;
var del=firebase.firestore.FieldValue.delete();
var u={};
days.forEach(function(day){u[me+'_'+day.id]=del});
u['last_'+me]=Date.now();
docRef.set(u,{merge:true}).then(function(){
document.getElementById('status').textContent='🔄 Reset !';
setTimeout(function(){document.getElementById('status').textContent=''},1500);
});
}

docRef.onSnapshot(function(doc){buildUI(doc.exists?doc.data():null)});
setInterval(updateLastMaj,60000);
</script>
</body>
</html>
