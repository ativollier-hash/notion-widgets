<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:#faf8f5;padding:14px}
.w{background:#fff;border-radius:22px;padding:24px;max-width:800px;margin:0 auto;box-shadow:0 4px 24px rgba(0,0,0,.05);border:1px solid #ece8e2}
h2{font-family:'Playfair Display',serif;font-size:18px;color:#2d2a26;margin-bottom:4px;text-align:center}
.sub{font-size:12px;color:#9a958e;margin-bottom:14px;text-align:center}
.tools{display:flex;gap:8px;justify-content:center;margin-bottom:12px;flex-wrap:wrap}
.tbtn{padding:8px 18px;border:2.5px solid #ece8e2;border-radius:12px;background:#fff;font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all .2s;color:#2d2a26}
.tbtn:hover{border-color:#e07a5f;color:#e07a5f}
.tbtn.active{border-color:#e07a5f;background:#e07a5f;color:#fff}
.tbtn.lock{background:#2d8a4e;border-color:#2d8a4e;color:#fff}
.tbtn.lock:hover{background:#246e3e}
.map{position:relative;width:100%;border-radius:14px;overflow:hidden;border:2px solid #e8e2d8;cursor:crosshair}
.map.locked{cursor:default}
.map img{width:100%;display:block}
.pin{position:absolute;transform:translate(-50%,-100%);font-size:36px;filter:drop-shadow(0 3px 6px rgba(0,0,0,.35));transition:all .2s;z-index:10;pointer-events:none}
.pin.bounce{animation:bounce 0.5s ease}
@keyframes bounce{0%{transform:translate(-50%,-100%) scale(1)}40%{transform:translate(-50%,-100%) scale(1.3)}100%{transform:translate(-50%,-100%) scale(1)}}
.lbl{position:absolute;transform:translate(-50%,8px);font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;color:#2d2a26;background:rgba(255,255,255,.92);padding:3px 10px;border-radius:8px;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,.12);z-index:10;pointer-events:none}
.line{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5}
.line svg{width:100%;height:100%}
.flight{stroke:#e07a5f;stroke-width:3;fill:none;stroke-dasharray:10 6;animation:dash 3s linear infinite;filter:drop-shadow(0 0 4px rgba(224,122,95,.4))}
.flight-bg{stroke:rgba(224,122,95,.12);stroke-width:12;fill:none}
@keyframes dash{to{stroke-dashoffset:-32}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(224,122,95,.5)}50%{box-shadow:0 0 0 16px rgba(224,122,95,0)}}
.glow{position:absolute;width:20px;height:20px;border-radius:50%;background:rgba(224,122,95,.3);transform:translate(-50%,-50%);animation:pulse 2s ease-in-out infinite;pointer-events:none;z-index:9}
.info{text-align:center;padding:12px;background:#faf8f5;border-radius:12px;margin-top:12px;font-size:12px;color:#9a958e;border:1px solid #ece8e2}
.info b{color:#e07a5f}
.coords{text-align:center;margin-top:10px;padding:12px;background:#f0faf2;border-radius:12px;border:1px solid #c8e6c9;display:none;font-size:12px;color:#2d8a4e;font-weight:600}
.coords code{background:#fff;padding:2px 8px;border-radius:6px;font-family:monospace;font-size:11px;display:block;margin-top:6px;word-break:break-all;text-align:left;line-height:1.8;color:#2d2a26}
.dist{background:linear-gradient(135deg,#fff5f2,#fef9f0);border-radius:16px;padding:16px 20px;display:flex;justify-content:center;gap:28px;flex-wrap:wrap;align-items:center;margin-top:12px;display:none}
.stat{text-align:center}
.val{font-family:'Playfair Display',serif;font-size:28px;font-weight:800;color:#e07a5f;line-height:1}
.lbl2{font-size:10px;color:#9a958e;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.heart{font-size:24px;animation:beat 1.2s ease-in-out infinite;display:inline-block}
@keyframes beat{0%,100%{transform:scale(1)}15%{transform:scale(1.2)}30%{transform:scale(1)}45%{transform:scale(1.15)}}
.ft{margin-top:12px;font-size:9px;color:#c5c0b8;text-align:center}
</style>
</head>
<body>
<div class="w">
<h2>Placer les Points 📍</h2>
<div class="sub">Clique sur un bouton, puis clique sur la carte pour placer</div>
<div class="tools">
<button class="tbtn" id="btn-lr" onclick="setMode('lr')">🏰 La Rochelle</button>
<button class="tbtn" id="btn-nc" onclick="setMode('nc')">🐟 N. Calédonie</button>
<button class="tbtn lock" id="btn-lock" onclick="lock()">🔒 Lock</button>
</div>
<div class="map" id="mapBox">
<img src="https://ativollier-hash.github.io/notion-widgets/world-map-vintage.jpg" alt="Carte" id="mapImg">
<div class="glow" id="glow-lr" style="display:none"></div>
<div class="pin" id="pin-lr" style="display:none">🏰</div>
<div class="lbl" id="lbl-lr" style="display:none">🇫🇷 La Rochelle</div>
<div class="glow" id="glow-nc" style="display:none"></div>
<div class="pin" id="pin-nc" style="display:none">🐟</div>
<div class="lbl" id="lbl-nc" style="display:none">🇳🇨 N. Calédonie</div>
<div class="line" id="line" style="display:none">
<svg viewBox="0 0 100 100" preserveAspectRatio="none" id="lineSvg">
<path class="flight-bg" id="pathBg" d=""/>
<path class="flight" id="pathFg" d=""/>
</svg>
</div>
</div>
<div class="info" id="info">Sélectionne <b>🏰 La Rochelle</b> ou <b>🐟 N. Calédonie</b> puis clique sur la carte</div>
<div class="coords" id="coords"></div>
<div class="dist" id="distBox">
<div class="stat"><div class="val">16 774</div><div class="lbl2">kilomètres</div></div>
<div class="heart">💕</div>
<div class="stat"><div class="val">22h 30</div><div class="lbl2">de vol</div></div>
<div class="heart">💕</div>
<div class="stat"><div class="val">+9h</div><div class="lbl2">décalage</div></div>
</div>
<div class="ft">🏰💕🐟 Nous Deux.</div>
</div>
<script>
var mode=null,locked=false;
var pos={lr:null,nc:null};

function setMode(m){
if(locked)return;
mode=m;
document.getElementById('btn-lr').classList.toggle('active',m==='lr');
document.getElementById('btn-nc').classList.toggle('active',m==='nc');
document.getElementById('info').innerHTML='Clique sur la carte pour placer <b>'+(m==='lr'?'🏰 La Rochelle':'🐟 N. Calédonie')+'</b>';
}

document.getElementById('mapBox').addEventListener('click',function(e){
if(locked||!mode)return;
var rect=this.getBoundingClientRect();
var x=((e.clientX-rect.left)/rect.width)*100;
var y=((e.clientY-rect.top)/rect.height)*100;
pos[mode]={x:x,y:y};

var pin=document.getElementById('pin-'+mode);
var lbl=document.getElementById('lbl-'+mode);
var glow=document.getElementById('glow-'+mode);
pin.style.left=x+'%';pin.style.top=y+'%';pin.style.display='block';
pin.classList.remove('bounce');void pin.offsetWidth;pin.classList.add('bounce');
lbl.style.left=x+'%';lbl.style.top=y+'%';lbl.style.display='block';
glow.style.left=x+'%';glow.style.top=y+'%';glow.style.display='block';

updateLine();

if(pos.lr&&pos.nc){
document.getElementById('info').innerHTML='Les deux points sont placés ! Clique <b>🔒 Lock</b> pour valider';
}
});

function updateLine(){
if(!pos.lr||!pos.nc)return;
var d='M '+pos.lr.x+' '+pos.lr.y+' Q '+((pos.lr.x+pos.nc.x)/2)+' '+(Math.min(pos.lr.y,pos.nc.y)-15)+', '+pos.nc.x+' '+pos.nc.y;
document.getElementById('pathBg').setAttribute('d',d);
document.getElementById('pathFg').setAttribute('d',d);
document.getElementById('line').style.display='block';
}

function lock(){
if(!pos.lr||!pos.nc){
document.getElementById('info').innerHTML='<b>Place les deux points d\'abord !</b>';
return;
}
locked=!locked;
document.getElementById('btn-lock').textContent=locked?'🔓 Unlock':'🔒 Lock';
document.getElementById('mapBox').classList.toggle('locked',locked);
document.getElementById('btn-lr').style.opacity=locked?.5:1;
document.getElementById('btn-nc').style.opacity=locked?.5:1;
mode=null;
document.getElementById('btn-lr').classList.remove('active');
document.getElementById('btn-nc').classList.remove('active');

if(locked){
document.getElementById('info').innerHTML='✅ <b>Verrouillé !</b> Copie les coordonnées ci-dessous pour le code final';
document.getElementById('distBox').style.display='flex';
var c=document.getElementById('coords');
c.style.display='block';
c.innerHTML='📋 Coordonnées sauvegardées :<code>'
+'La Rochelle : left: '+pos.lr.x.toFixed(1)+'%  top: '+pos.lr.y.toFixed(1)+'%\n'
+'N. Calédonie : left: '+pos.nc.x.toFixed(1)+'%  top: '+pos.nc.y.toFixed(1)+'%\n'
+'Ligne SVG : M '+pos.lr.x.toFixed(1)+' '+pos.lr.y.toFixed(1)+' Q '+((pos.lr.x+pos.nc.x)/2).toFixed(1)+' '+(Math.min(pos.lr.y,pos.nc.y)-15).toFixed(1)+', '+pos.nc.x.toFixed(1)+' '+pos.nc.y.toFixed(1)
+'</code>';
}else{
document.getElementById('coords').style.display='none';
document.getElementById('distBox').style.display='none';
document.getElementById('info').innerHTML='Sélectionne un point et clique sur la carte pour le déplacer';
}
}
</script>
</body>
</html>
