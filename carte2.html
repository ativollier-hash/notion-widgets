<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:#faf8f5;padding:14px}
.w{background:#fff;border-radius:22px;padding:24px;max-width:750px;margin:0 auto;box-shadow:0 4px 24px rgba(0,0,0,.05);border:1px solid #ece8e2;text-align:center}
h2{font-family:'Playfair Display',serif;font-size:18px;color:#2d2a26;margin-bottom:2px}
.sub{font-size:12px;color:#9a958e;margin-bottom:14px;font-style:italic}
.map{position:relative;width:100%;border-radius:14px;overflow:hidden;margin-bottom:16px;border:2px solid #e8e2d8}
.map iframe{width:100%;height:350px;border:none}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.pin{position:absolute;font-size:32px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.3));animation:bounce 2s ease-in-out infinite}
.pin-lr{top:22%;left:37%}
.pin-nc{top:56%;right:8%}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.lbl{position:absolute;font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;color:#2d2a26;background:rgba(255,255,255,.92);padding:3px 10px;border-radius:8px;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,.12)}
.lbl-lr{top:28%;left:30%}
.lbl-nc{top:62%;right:3%}
.line{position:absolute;top:0;left:0;width:100%;height:100%}
.line svg{width:100%;height:100%}
.flight{stroke:#e07a5f;stroke-width:3;fill:none;stroke-dasharray:10 6;animation:dash 3s linear infinite;filter:drop-shadow(0 0 4px rgba(224,122,95,.4))}
.flight-bg{stroke:rgba(224,122,95,.15);stroke-width:10;fill:none}
@keyframes dash{to{stroke-dashoffset:-32}}
.dist{background:linear-gradient(135deg,#fff5f2,#fef9f0);border-radius:16px;padding:16px 20px;display:flex;justify-content:center;gap:28px;flex-wrap:wrap;align-items:center}
.stat{text-align:center}
.val{font-family:'Playfair Display',serif;font-size:28px;font-weight:800;color:#e07a5f;line-height:1}
.lbl2{font-size:10px;color:#9a958e;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.heart{font-size:24px;animation:beat 1.2s ease-in-out infinite;display:inline-block}
@keyframes beat{0%,100%{transform:scale(1)}15%{transform:scale(1.2)}30%{transform:scale(1)}45%{transform:scale(1.15)}}
.ft{margin-top:12px;font-size:9px;color:#c5c0b8}
</style>
</head>
<body>
<div class="w">
<h2>Notre Distance 🌍</h2>
<div class="sub">16 774 km ne sont rien quand on s'aime</div>
<div class="map">
<iframe src="https://www.openstreetmap.org/export/embed.html?bbox=-20,0,180,-40&layer=mapnik" scrolling="no"></iframe>
<div class="overlay">
<div class="line">
<svg viewBox="0 0 100 100" preserveAspectRatio="none">
<path class="flight-bg" d="M 37 25 Q 55 10, 90 58"/>
<path class="flight" d="M 37 25 Q 55 10, 90 58"/>
</svg>
</div>
<div class="pin pin-lr">🏰</div>
<div class="lbl lbl-lr">🇫🇷 La Rochelle</div>
<div class="pin pin-nc">🐟</div>
<div class="lbl lbl-nc">🇳🇨 N. Calédonie</div>
</div>
</div>
<div class="dist">
<div class="stat"><div class="val">16 774</div><div class="lbl2">kilomètres</div></div>
<div class="heart">💕</div>
<div class="stat"><div class="val">22h 30</div><div class="lbl2">de vol</div></div>
<div class="heart">💕</div>
<div class="stat"><div class="val">+9h</div><div class="lbl2">décalage</div></div>
</div>
<div class="ft">🏰💕🐟 Nous Deux.</div>
</div>
</body>
</html>
