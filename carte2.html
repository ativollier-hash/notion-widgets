<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:#faf8f5;padding:14px}
.w{background:#fff;border-radius:22px;padding:24px;max-width:750px;margin:0 auto;box-shadow:0 4px 24px rgba(0,0,0,.05);border:1px solid #ece8e2;text-align:center}
h2{font-family:'Playfair Display',serif;font-size:18px;color:#2d2a26;margin-bottom:2px}
.sub{font-size:12px;color:#9a958e;margin-bottom:12px;font-style:italic}
.tools{display:flex;gap:6px;justify-content:center;margin-bottom:10px;flex-wrap:wrap}
.tbtn{padding:7px 16px;border:2px solid #ece8e2;border-radius:10px;background:#fff;font-family:'Nunito',sans-serif;font-weight:700;font-size:12px;cursor:pointer;transition:all .2s;color:#2d2a26}
.tbtn:hover{border-color:#e07a5f;color:#e07a5f}
.tbtn.active{border-color:#e07a5f;background:#e07a5f;color:#fff}
.tbtn.lock{background:#2d8a4e;border-color:#2d8a4e;color:#fff}
.tbtn.lock:hover{background:#246e3e}
.tbtn.locked{background:#9a958e;border-color:#9a958e;color:#fff}
.map{position:relative;width:100%;border-radius:14px;overflow:hidden;border:2px solid #e8e2d8;cursor:crosshair;user-select:none;-webkit-user-select:none}
.map.locked{cursor:default}
.map img{width:100%;display:block;pointer-events:none}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%}
.pin{position:absolute;transform:translate(-50%,-100%);font-size:38px;filter:drop-shadow(0 3px 8px rgba(0,0,0,.4));transition:font-size .2s;z-index:10;pointer-events:none}
.glow{position:absolute;width:24px;height:24px;border-radius:50%;background:rgba(224,122,95,.25);transform:translate(-50%,-50%);animation:pulse 2.5s ease-in-out infinite;pointer-events:none;z-index:9}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(224,122,95,.5);transform:translate(-50%,-50%) scale(1)}50%{box-shadow:0 0 0 20px rgba(224,122,95,0);transform:translate(-50%,-50%) scale(1.5)}}
.lbl{position:absolute;transform:translate(-50%,10px);font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;color:#2d2a26;background:rgba(255,255,255,.93);padding:3px 10px;border-radius:8px;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.12);z-index:10;pointer-events:none}
.line{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5}
.line svg{width:100%;height:100%}
.flight{stroke:#e07a5f;stroke-width:3;fill:none;stroke-dasharray:10 6;animation:dash 4s linear infinite;filter:drop-shadow(0 0 5px rgba(224,122,95,.4))}
.flight-bg{stroke:rgba(224,122,95,.1);stroke-width:14;fill:none}
@keyframes dash{to{stroke-dashoffset:-32}}
.dist{background:linear-gradient(135deg,#fff5f2,#fef9f0);border-radius:16px;padding:16px 20px;display:flex;justify-content:center;gap:24px;flex-wrap:wrap;align-items:center;margin-top:14px}
.stat{text-align:center}
.val{font-family:'Playfair Display',serif;font-size:28px;font-weight:800;color:#e07a5f;line-height:1}
.val2{font-size:12px;color:#9a958e;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.heart{font-size:22px;animation:beat 1.2s ease-in-out infinite;display:inline-block}
@keyframes beat{0%,100%{transform:scale(1)}15%{transform:scale(1.2)}30%{transform:scale(1)}45%{transform:scale(1.15)}}
.info{font-size:11px;color:#b0ab9f;margin-top:8px}
.ft{margin-top:12px;font-size:9px;color:#c5c0b8}
</style>
</head>
<body>
<div class="w">
<h2>Notre Distance 🌍</h2>
<div class="sub" id="sub">Clique un bouton puis clique sur la carte</div>
<div class="tools" id="tools">
<button class="tbtn" id="btn-lr" onclick="setMode('lr')">🏰 France</button>
<button class="tbtn" id="btn-nc" onclick="setMode('nc')">🐟 N. Calédonie</button>
<button class="tbtn lock" id="btn-lock" onclick="lock()">🔒 Verrouiller</button>
</div>
<div class="map" id="mapBox">
<img src="https://ativollier-hash.github.io/notion-widgets/atlas.jpg" alt="Carte">
<div class="overlay" id="overlay">
<div class="glow" id="glow-lr" style="display:none"></div>
<div class="pin" id="pin-lr" style="display:none">🏰</div>
<div class="lbl" id="lbl-lr" style="display:none">🇫🇷</div>
<div class="glow" id="glow-nc" style="display:none"></div>
<div class="pin" id="pin-nc" style="display:none">🐟</div>
<div class="lbl" id="lbl-nc" style="display:none">🇳🇨</div>
<div class="line" id="line" style="display:none">
<svg viewBox="0 0 100 100" preserveAspectRatio="none" id="svg">
<path class="flight-bg" id="pbg" d=""/>
<path class="flight" id="pfg" d=""/>
</svg>
</div>
</div>
</div>
<div class="dist" id="distBox" style="display:none">
<div class="stat"><div class="val" id="km">—</div><div class="val2">kilomètres</div></div>
<div class="heart">💕</div>
<div class="stat"><div class="val" id="fly">—</div><div class="val2">de vol</div></div>
<div class="heart">💕</div>
<div class="stat"><div class="val" id="tz">—</div><div class="val2">décalage</div></div>
</div>
<div class="info" id="info"></div>
<div class="ft">🏰💕🐟 Nous Deux.</div>
</div>
<script>
var mode=null,isLocked=false;
var pos={lr:null,nc:null};
var geo={lr:{lat:46.16,lng:-1.15},nc:{lat:-22.26,lng:166.45}};
var KEY='carte-pos';

function load(){
try{var s=localStorage.getItem(KEY);if(s){var d=JSON.parse(s);pos=d.pos;geo=d.geo;isLocked=d.locked||false;
['lr','nc'].forEach(function(w){if(pos[w])placePin(w,pos[w].x,pos[w].y)});
updateLine();updateDist();
if(isLocked)doLock();
}}catch(e){}
}

function save(){
try{localStorage.setItem(KEY,JSON.stringify({pos:pos,geo:geo,locked:isLocked}))}catch(e){}
}

function setMode(m){
if(isLocked)return;
mode=m;
document.getElementById('btn-lr').classList.toggle('active',m==='lr');
document.getElementById('btn-nc').classList.toggle('active',m==='nc');
document.getElementById('sub').textContent='Clique sur la carte pour placer '+(m==='lr'?'🏰':'🐟');
}

document.getElementById('mapBox').addEventListener('click',function(e){
if(isLocked||!mode)return;
var rect=this.getBoundingClientRect();
var x=((e.clientX-rect.left)/rect.width)*100;
var y=((e.clientY-rect.top)/rect.height)*100;
pos[mode]={x:x,y:y};
var lat=85-y*1.7;
var lng=-180+x*3.6;
geo[mode]={lat:lat,lng:lng};
placePin(mode,x,y);
updateLine();updateDist();save();
});

function placePin(w,x,y){
var pin=document.getElementById('pin-'+w);
var lbl=document.getElementById('lbl-'+w);
var glow=document.getElementById('glow-'+w);
pin.style.left=x+'%';pin.style.top=y+'%';pin.style.display='block';
lbl.style.left=x+'%';lbl.style.top=y+'%';lbl.style.display='block';
glow.style.left=x+'%';glow.style.top=y+'%';glow.style.display='block';
}

function updateLine(){
if(!pos.lr||!pos.nc)return;
var mx=(pos.lr.x+pos.nc.x)/2;
var my=Math.min(pos.lr.y,pos.nc.y)-15;
var d='M '+pos.lr.x+' '+pos.lr.y+' Q '+mx+' '+my+', '+pos.nc.x+' '+pos.nc.y;
document.getElementById('pbg').setAttribute('d',d);
document.getElementById('pfg').setAttribute('d',d);
document.getElementById('line').style.display='block';
}

function updateDist(){
if(!geo.lr||!geo.nc)return;
document.getElementById('distBox').style.display='flex';
var km=haversine(geo.lr.lat,geo.lr.lng,geo.nc.lat,geo.nc.lng);
var hrs=Math.round(km/800);
var h=Math.floor(hrs);var m=Math.round((hrs-h)*60);
document.getElementById('km').textContent=Math.round(km).toLocaleString('fr-FR');
document.getElementById('fly').textContent=h+'h'+(m>0?' '+m+'min':'');
var tzDiff=Math.round((geo.nc.lng-geo.lr.lng)/15);
document.getElementById('tz').textContent=(tzDiff>=0?'+':'')+tzDiff+'h';
}

function haversine(lat1,lon1,lat2,lon2){
var R=6371;
var dLat=(lat2-lat1)*Math.PI/180;
var dLon=(lon2-lon1)*Math.PI/180;
var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function lock(){
if(!pos.lr||!pos.nc){
document.getElementById('sub').textContent='Place les deux points d\'abord !';return;
}
isLocked=true;doLock();save();
}

function doLock(){
isLocked=true;
document.getElementById('mapBox').classList.add('locked');
document.getElementById('tools').style.display='none';
document.getElementById('sub').textContent='';
document.getElementById('info').textContent='Double-clique sur la carte pour déverrouiller';
mode=null;
}

document.getElementById('mapBox').addEventListener('dblclick',function(){
if(!isLocked)return;
isLocked=false;
document.getElementById('mapBox').classList.remove('locked');
document.getElementById('tools').style.display='flex';
document.getElementById('sub').textContent='Clique un bouton puis clique sur la carte';
document.getElementById('info').textContent='';
save();
});

load();
</script>
</body>
</html>
