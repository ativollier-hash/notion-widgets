<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:#faf8f5;padding:14px}
.w{background:#fff;border-radius:20px;padding:20px 24px;max-width:700px;margin:0 auto;box-shadow:0 4px 20px rgba(0,0,0,.05);border:1px solid #ece8e2;text-align:center}
h2{font-family:'Playfair Display',serif;font-size:18px;color:#2d2a26;margin-bottom:4px}
.day{font-size:11px;color:#b0ab9f;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.row{display:flex;gap:20px;align-items:flex-start}
.col{flex:1;min-width:0}
.p{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.nm{font-size:13px;font-weight:700;color:#2d2a26}
.lc{font-size:10px;color:#b0ab9f;font-weight:600}
.ms{display:flex;flex-wrap:wrap;gap:5px;justify-content:center}
.m{width:42px;height:42px;border-radius:12px;border:2.5px solid transparent;background:#f5f2ed;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.m:hover{transform:scale(1.15);background:#ece8e2}
.m.s{border-color:#e07a5f;background:rgba(224,122,95,.1);transform:scale(1.18);box-shadow:0 2px 10px rgba(224,122,95,.25)}
.sep{width:1px;background:#ece8e2;align-self:stretch}
.r{text-align:center;padding:10px;background:linear-gradient(135deg,#fff5f2,#fef9f0);border-radius:14px;margin-top:12px;display:none}
.r.v{display:block;animation:fi .4s ease}
.rm{font-size:32px}
.rd{font-family:'Playfair Display',serif;font-size:13px;color:#2d2a26;margin-top:2px}
.status{font-size:10px;color:#6bbd7b;margin-top:8px;font-weight:600}
.rst{font-size:9px;color:#c5c0b8;border:1.5px solid #f0ebe4;border-radius:8px;padding:4px 12px;background:#fff;cursor:pointer;margin-top:8px;font-family:'Nunito',sans-serif;font-weight:600}
.rst:hover{color:#e07a5f;border-color:#e07a5f}
.ft{margin-top:10px;font-size:9px;color:#c5c0b8}
.loading{color:#9a958e;font-size:12px;padding:20px}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="w">
<h2>Mood du Jour ✨</h2>
<div class="day" id="day"></div>
<div id="content"><div class="loading">Chargement...</div></div>
<div class="r" id="res"><div class="rm" id="rm"></div><div class="rd" id="rd"></div></div>
<div class="status" id="status"></div>
<button class="rst" onclick="resetMood()">🔄 Reset</button>
<div class="ft">🏰💕🐟 Nous Deux.</div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyDywRXlDSyFgI2BlmMCMXAMc2uZKUWJY54",authDomain:"notion-bdd.firebaseapp.com",projectId:"notion-bdd",storageBucket:"notion-bdd.firebasestorage.app",messagingSenderId:"641330827114",appId:"1:641330827114:web:0bf5fc986540a4c9085f13"});
var db=firebase.firestore();
var emojis=['😍','😊','😴','💪','😢','🥳','😤','🤒','🥰','😈','🫠','🤯'];
var today=new Date().toISOString().slice(0,10);
var docRef=db.collection('couple').doc('mood-'+today);

document.getElementById('day').textContent=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

function buildUI(data){
  var d=data||{a:null,k:null};
  var html='<div class="row"><div class="col">';
  html+='<div class="p"><span style="font-size:18px">🏰❤️</span><div><div class="nm">Alexandre</div><div class="lc">🇫🇷 La Rochelle</div></div></div>';
  html+='<div class="ms">';
  emojis.forEach(function(e){
    var sel=d.a===e?' s':'';
    html+='<button class="m'+sel+'" onclick="pick(\'a\',\''+e+'\')">'+e+'</button>';
  });
  html+='</div></div><div class="sep"></div><div class="col">';
  html+='<div class="p"><span style="font-size:18px">🐟💕</span><div><div class="nm">Klara</div><div class="lc">🇳🇨 N. Calédonie</div></div></div>';
  html+='<div class="ms">';
  emojis.forEach(function(e){
    var sel=d.k===e?' s':'';
    html+='<button class="m'+sel+'" onclick="pick(\'k\',\''+e+'\')">'+e+'</button>';
  });
  html+='</div></div></div>';
  document.getElementById('content').innerHTML=html;
  if(d.a||d.k){
    document.getElementById('rm').textContent=(d.a||'…')+' × '+(d.k||'…');
    document.getElementById('rd').textContent=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
    document.getElementById('res').classList.add('v');
  }else{
    document.getElementById('res').classList.remove('v');
  }
}

function pick(who,emoji){
  var u={};u[who]=emoji;u['date']=today;
  docRef.set(u,{merge:true}).then(function(){
    document.getElementById('status').textContent='✅ Sauvegardé !';
    setTimeout(function(){document.getElementById('status').textContent=''},2000);
  });
}

function resetMood(){
  docRef.delete().then(function(){
    document.getElementById('status').textContent='🔄 Reset !';
    document.getElementById('res').classList.remove('v');
    setTimeout(function(){document.getElementById('status').textContent=''},1500);
  });
}

docRef.onSnapshot(function(doc){
  buildUI(doc.exists?doc.data():null);
});
</script>
</body>
</html>
