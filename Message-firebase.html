<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:#faf8f5;padding:14px}
.w{background:#fff;border-radius:20px;padding:20px 24px;max-width:700px;margin:0 auto;box-shadow:0 4px 20px rgba(0,0,0,.05);border:1px solid #ece8e2;text-align:center}
h2{font-family:'Playfair Display',serif;font-size:18px;color:#2d2a26;margin-bottom:4px}
.day{font-size:11px;color:#b0ab9f;font-weight:600;margin-bottom:14px}
.row{display:flex;gap:20px;text-align:left}
.col{flex:1;min-width:0}
.p{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.nm{font-size:13px;font-weight:700;color:#2d2a26}
.lc{font-size:10px;color:#b0ab9f;font-weight:600}
.sep{width:1px;background:#ece8e2;align-self:stretch}
.box{position:relative}
textarea{width:100%;padding:10px 40px 10px 12px;border:1.5px solid #ece8e2;border-radius:12px;font-family:'Nunito',sans-serif;font-size:12px;color:#2d2a26;background:#faf8f5;resize:none;outline:none;transition:border .3s;min-height:50px}
textarea:focus{border-color:#e07a5f}
textarea::placeholder{color:#c5c0b8;font-style:italic}
.send{position:absolute;right:6px;bottom:6px;width:28px;height:28px;border-radius:50%;border:none;background:#e07a5f;color:#fff;font-size:13px;cursor:pointer;transition:all .2s;display:none}
.send:hover{background:#c9694f;transform:scale(1.1)}
.send.v{display:block}
.bubble{padding:12px 14px;background:linear-gradient(135deg,#fff5f2,#fef9f0);border-radius:14px;margin-top:8px;display:none;position:relative;text-align:left}
.bubble.v{display:block;animation:fi .4s ease}
.bt{font-size:13px;color:#2d2a26;line-height:1.5;font-style:italic}
.btime{font-size:9px;color:#b0ab9f;margin-top:4px}
.x{position:absolute;top:6px;right:10px;background:none;border:none;color:#c5c0b8;cursor:pointer;font-size:16px}
.x:hover{color:#e07a5f}
.status{font-size:10px;color:#6bbd7b;margin-top:8px;font-weight:600;text-align:center}
.ft{text-align:center;margin-top:10px;font-size:9px;color:#c5c0b8}
.loading{color:#9a958e;font-size:12px;padding:20px;text-align:center}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="w">
<h2>Petit Mot du Jour 💌</h2>
<div class="day" id="day"></div>
<div class="row">
<div class="col">
<div class="p"><span style="font-size:16px">🏰❤️</span><div><div class="nm">Alexandre</div><div class="lc">🇫🇷 La Rochelle</div></div></div>
<div class="box">
<textarea id="ta" placeholder="Écris-lui quelque chose..." oninput="ck('a')"></textarea>
<button class="send" id="sa" onclick="go('a')">💌</button>
</div>
<div class="bubble" id="ba"><button class="x" onclick="cl('a')">✕</button><div class="bt" id="ma"></div><div class="btime" id="da"></div></div>
</div>
<div class="sep"></div>
<div class="col">
<div class="p"><span style="font-size:16px">🐟💕</span><div><div class="nm">Klara</div><div class="lc">🇳🇨 N. Calédonie</div></div></div>
<div class="box">
<textarea id="tk" placeholder="Écris-lui quelque chose..." oninput="ck('k')"></textarea>
<button class="send" id="sk" onclick="go('k')">💌</button>
</div>
<div class="bubble" id="bk"><button class="x" onclick="cl('k')">✕</button><div class="bt" id="mk"></div><div class="btime" id="dk"></div></div>
</div>
</div>
<div class="status" id="status"></div>
<div class="ft">🏰💕🐟 Nous Deux.</div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyDywRXlDSyFgI2BlmMCMXAMc2uZKUWJY54",
  authDomain:"notion-bdd.firebaseapp.com",
  projectId:"notion-bdd",
  storageBucket:"notion-bdd.firebasestorage.app",
  messagingSenderId:"641330827114",
  appId:"1:641330827114:web:0bf5fc986540a4c9085f13"
});
var db=firebase.firestore();
var now=new Date(),today=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
var docRef=db.collection('couple').doc('message-'+today);
  
document.getElementById('day').textContent=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});

function ck(w){
  var t=document.getElementById('t'+w);
  document.getElementById('s'+w).classList.toggle('v',t.value.trim().length>0);
}

function go(w){
  var t=document.getElementById('t'+w),v=t.value.trim();
  if(!v)return;
  var update={};
  update['msg_'+w]=v;
  update['time_'+w]=new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  update['date']=today;
  docRef.set(update,{merge:true}).then(function(){
    t.value='';document.getElementById('s'+w).classList.remove('v');
    document.getElementById('status').textContent='✅ Message envoyé !';
    setTimeout(function(){document.getElementById('status').textContent=''},2000);
  });
}

function cl(w){
  var update={};
  update['msg_'+w]=null;
  update['time_'+w]=null;
  docRef.set(update,{merge:true});
}

docRef.onSnapshot(function(doc){
  var d=doc.exists?doc.data():{};
  ['a','k'].forEach(function(w){
    var b=document.getElementById('b'+w);
    var msg=d['msg_'+w];
    var time=d['time_'+w];
    if(msg){
      document.getElementById('m'+w).textContent='« '+msg+' »';
      document.getElementById('d'+w).textContent=time||'';
      b.classList.add('v');
    }else{
      b.classList.remove('v');
    }
  });
});

document.querySelectorAll('textarea').forEach(function(el){
  el.addEventListener('input',function(){this.style.height='auto';this.style.height=this.scrollHeight+'px'});
});
</script>
</body>
</html>
