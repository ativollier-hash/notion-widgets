<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:#faf8f5;padding:14px}
.w{background:#fff;border-radius:22px;padding:24px;max-width:750px;margin:0 auto;box-shadow:0 4px 24px rgba(0,0,0,.05);border:1px solid #ece8e2;text-align:center}
h2{font-family:'Playfair Display',serif;font-size:18px;color:#2d2a26;margin-bottom:2px}
.sub{font-size:12px;color:#9a958e;margin-bottom:14px;font-style:italic}
.map{position:relative;width:100%;border-radius:14px;overflow:hidden;margin-bottom:16px;border:2px solid #e8e2d8}
.map img{width:100%;display:block}
.map svg{position:absolute;top:0;left:0;width:100%;height:100%}
@keyframes pulse{0%,100%{r:8;opacity:1}50%{r:14;opacity:.5}}
.pulse{animation:pulse 1.8s ease-in-out infinite}
@keyframes ring{0%{r:8;opacity:.7;stroke-width:3}100%{r:30;opacity:0;stroke-width:.5}}
.ring{fill:none;stroke:#e07a5f;stroke-width:2;opacity:0;animation:ring 2s ease-out infinite}
@keyframes dash{to{stroke-dashoffset:-30}}
.flight{stroke:#e07a5f;stroke-width:3.5;fill:none;stroke-dasharray:12 8;animation:dash 1.2s linear infinite;filter:drop-shadow(0 0 6px rgba(224,122,95,.5))}
.flight-bg{stroke:rgba(224,122,95,.15);stroke-width:12;fill:none}
@keyframes fly{0%{offset-distance:0%}100%{offset-distance:100%}}
.plane{font-size:28px;offset-rotate:auto;animation:fly 6s linear infinite;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3))}
.tag{font-family:'Nunito',sans-serif;font-weight:700;fill:#2d2a26}
.tag-bg{fill:rgba(255,255,255,.9);rx:6;filter:drop-shadow(0 1px 3px rgba(0,0,0,.1))}
.dist{background:linear-gradient(135deg,#fff5f2,#fef9f0);border-radius:16px;padding:16px 20px;display:flex;justify-content:center;gap:28px;flex-wrap:wrap;align-items:center}
.stat{text-align:center}
.val{font-family:'Playfair Display',serif;font-size:28px;font-weight:800;color:#e07a5f;line-height:1}
.lbl{font-size:10px;color:#9a958e;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.heart{font-size:24px;animation:beat 1.2s ease-in-out infinite;display:inline-block}
@keyframes beat{0%,100%{transform:scale(1)}15%{transform:scale(1.2)}30%{transform:scale(1)}45%{transform:scale(1.15)}}
.ft{margin-top:12px;font-size:9px;color:#c5c0b8}
</style>
</head>
<body>
<div class="w">
<h2>Notre Distance 🌍</h2>
<div class="sub">16 774 km ne sont rien quand on s'aime</div>
<div class="map">
<img src="https://ativollier-hash.github.io/notion-widgets/world-map-vintage.jpg" alt="Carte du monde vintage">
<svg viewBox="0 0 3000 2000" xmlns="http://www.w3.org/2000/svg">

<!-- La Rochelle, France -->
<circle class="ring" cx="1310" cy="440" style="animation-delay:0s"/>
<circle class="ring" cx="1310" cy="440" style="animation-delay:1s"/>
<circle class="pulse" cx="1310" cy="440" r="8" fill="#e07a5f" filter="drop-shadow(0 0 6px rgba(224,122,95,.6))"/>

<!-- Nouvelle-Calédonie — east of Australia, aligned with top of NZ -->
<circle class="ring" cx="2620" cy="1160" style="animation-delay:.5s"/>
<circle class="ring" cx="2620" cy="1160" style="animation-delay:1.5s"/>
<circle class="pulse" cx="2620" cy="1160" r="8" fill="#e07a5f" style="animation-delay:.6s" filter="drop-shadow(0 0 6px rgba(224,122,95,.6))"/>

<!-- Flight path glow background -->
<path class="flight-bg" d="M 1310 440 C 1800 150, 2300 350, 2620 1160"/>

<!-- Flight path dashed -->
<path class="flight" d="M 1310 440 C 1800 150, 2300 350, 2620 1160"/>

<!-- Plane along path -->
<text class="plane" style="offset-path:path('M 1310 440 C 1800 150, 2300 350, 2620 1160')">✈️</text>

<!-- Label La Rochelle -->
<rect class="tag-bg" x="1120" y="455" width="165" height="30"/>
<text class="tag" x="1135" y="477" font-size="14">🇫🇷 La Rochelle</text>

<!-- Label Nouvelle-Calédonie -->
<rect class="tag-bg" x="2450" y="1175" width="185" height="30"/>
<text class="tag" x="2465" y="1197" font-size="14">🇳🇨 N. Calédonie</text>

</svg>
</div>
<div class="dist">
<div class="stat"><div class="val">16 774</div><div class="lbl">kilomètres</div></div>
<div class="heart">💕</div>
<div class="stat"><div class="val">22h 30</div><div class="lbl">de vol</div></div>
<div class="heart">💕</div>
<div class="stat"><div class="val">+9h</div><div class="lbl">décalage</div></div>
</div>
<div class="ft">🏰💕🐟 Nous Deux.</div>
</div>
</body>
</html>
