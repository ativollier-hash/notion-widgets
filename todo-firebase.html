<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:#faf8f5;padding:14px}
.w{background:#fff;border-radius:22px;padding:24px;max-width:750px;margin:0 auto;box-shadow:0 4px 24px rgba(0,0,0,.05);border:1px solid #ece8e2}
h2{font-family:'Playfair Display',serif;font-size:18px;color:#2d2a26;margin-bottom:4px;text-align:center}
.day{font-size:11px;color:#b0ab9f;font-weight:600;text-align:center;margin-bottom:6px}
.tabs{display:flex;gap:4px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
.tab{padding:7px 12px;border:2px solid #ece8e2;border-radius:10px;background:#fff;font-family:'Nunito',sans-serif;font-weight:700;font-size:11px;cursor:pointer;color:#9a958e;transition:all .15s}
.tab:hover{border-color:#e07a5f;color:#e07a5f}
.tab.s{border-color:#e07a5f;background:#e07a5f;color:#fff}
.who{display:flex;gap:8px;justify-content:center;margin-bottom:14px}
.wbtn{padding:8px 18px;border:2.5px solid #ece8e2;border-radius:12px;background:#fff;font-family:'Nunito',sans-serif;font-weight:700;font-size:12px;cursor:pointer;transition:all .15s;color:#2d2a26}
.wbtn:hover{border-color:#e07a5f;color:#e07a5f}
.wbtn.s{border-color:#e07a5f;background:#e07a5f;color:#fff}
.encourage{text-align:center;padding:10px;margin-bottom:12px;border-radius:14px;display:none;font-weight:700;font-size:13px;transition:all .3s}
.encourage.v{display:block;animation:fi .5s ease}
.encourage.l1{background:#fef9f0;color:#b0ab9f}
.encourage.l2{background:#fff5f2;color:#e07a5f}
.encourage.l3{background:#f0faf2;color:#3a8a4a}
.encourage.l4{background:linear-gradient(135deg,#f0faf2,#e8f5e9);color:#2d8a4e;font-size:15px}
.encourage .emj{font-size:24px;display:block;margin-bottom:2px}
.progress{width:100%;height:12px;background:#f0f0ed;border-radius:8px;overflow:hidden;margin-bottom:4px}
.pbar{height:100%;border-radius:8px;transition:width .6s ease}
.pbar.l1{background:linear-gradient(90deg,#d4cfc6,#b0ab9f)}
.pbar.l2{background:linear-gradient(90deg,#e8956e,#e07a5f)}
.pbar.l3{background:linear-gradient(90deg,#7dcb8a,#4caf50)}
.pbar.l4{background:linear-gradient(90deg,#ffd700,#ff8c00)}
.ptext{font-size:11px;color:#9a958e;text-align:center;margin-bottom:10px;font-weight:600}
.item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;margin-bottom:6px;background:#faf8f5;transition:all .2s}
.item:hover{background:#f5f0ea}
.item.done{background:rgba(107,189,123,.06)}
.cb{width:24px;height:24px;border-radius:8px;border:2.5px solid #d4cfc6;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;flex-shrink:0}
.cb:hover{border-color:#e07a5f}
.cb.checked{border-color:#6bbd7b;background:#6bbd7b;color:#fff}
.itxt{flex:1;font-size:13px;color:#2d2a26;font-weight:600}
.item.done .itxt{text-decoration:line-through;color:#b0ab9f}
.del{background:none;border:none;color:#d4cfc6;cursor:pointer;font-size:16px;padding:2px}
.del:hover{color:#e07a5f}
.addrow{display:flex;gap:6px;margin-top:10px}
.addin{flex:1;padding:10px 14px;border:1.5px solid #ece8e2;border-radius:12px;font-family:'Nunito',sans-serif;font-size:12px;color:#2d2a26;background:#faf8f5;outline:none}
.addin:focus{border-color:#e07a5f}
.addbtn{padding:10px 16px;border:none;border-radius:12px;background:#e07a5f;color:#fff;font-family:'Nunito',sans-serif;font-weight:700;font-size:12px;cursor:pointer}
.addbtn:hover{background:#c9694f}
.chart{margin:10px 0}
.chart canvas{width:100%;height:200px}
.bar-row{display:flex;align-items:flex-end;gap:6px;height:140px;justify-content:center;margin-bottom:6px;padding:0 10px}
.bar-col{flex:1;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;max-width:60px}
.bar{width:100%;border-radius:6px 6px 0 0;transition:height .5s ease;min-height:2px}
.bar.good{background:linear-gradient(180deg,#7dcb8a,#4caf50)}
.bar.mid{background:linear-gradient(180deg,#e8956e,#e07a5f)}
.bar.low{background:linear-gradient(180deg,#d4cfc6,#b0ab9f)}
.bar-label{font-size:9px;color:#b0ab9f;font-weight:600;margin-top:4px}
.bar-pct{font-size:10px;font-weight:700;color:#2d2a26;margin-bottom:2px}
.stat-box{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:12px}
.stat{text-align:center;padding:12px 16px;background:#faf8f5;border-radius:12px;min-width:80px}
.stat .sv{font-family:'Playfair Display',serif;font-size:22px;font-weight:800;color:#e07a5f}
.stat .sl{font-size:10px;color:#9a958e;font-weight:600;margin-top:2px}
.note{font-size:9px;color:#c5c0b8;margin-top:8px;text-align:center;font-style:italic}
.rst{font-size:9px;color:#c5c0b8;border:1.5px solid #f0ebe4;border-radius:8px;padding:4px 12px;background:#fff;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:600;margin-top:8px;display:block;margin-left:auto;margin-right:auto}
.rst:hover{color:#e07a5f;border-color:#e07a5f}
.status{font-size:10px;color:#6bbd7b;text-align:center;margin-top:6px;font-weight:600}
.ft{margin-top:12px;font-size:9px;color:#c5c0b8;text-align:center}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes confetti{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(-40px) rotate(360deg)}}
.confetti{position:relative;display:inline-block}
.confetti span{position:absolute;animation:confetti 1s ease forwards;font-size:16px}
</style>
</head>
<body>
<div class="w">
<h2>To-Do List ✅</h2>
<div class="day" id="day"></div>
<div class="who">
<button class="wbtn" id="wa" onclick="toggleWho('a')">🏰 Alexandre</button>
<button class="wbtn" id="wk" onclick="toggleWho('k')">🐟 Klara</button>
</div>
<div class="tabs">
<button class="tab s" id="t0" onclick="setTab(0)">📋 Routines*</button>
<button class="tab" id="t1" onclick="setTab(1)">📝 To-Do</button>
<button class="tab" id="t2" onclick="setTab(2)">🎯 Semaine*</button>
<button class="tab" id="t3" onclick="setTab(3)">🏆 Mois*</button>
<button class="tab" id="t4" onclick="setTab(4)">📊 Stats</button>
</div>
<div class="encourage" id="enc"></div>
<div id="zone"></div>
<div class="status" id="status"></div>
<div class="note">* Se réinitialise automatiquement (routines = chaque jour, semaine = chaque lundi, mois = chaque 1er)</div>
<div class="ft">🏰💕🐟 Nous Deux.</div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyDywRXlDSyFgI2BlmMCMXAMc2uZKUWJY54",authDomain:"notion-bdd.firebaseapp.com",projectId:"notion-bdd",storageBucket:"notion-bdd.firebasestorage.app",messagingSenderId:"641330827114",appId:"1:641330827114:web:0bf5fc986540a4c9085f13"});
var db=firebase.firestore();
var me=null,tab=0;
var now=new Date();var today=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
var weekKey=now.getFullYear()+'-W'+Math.ceil(((now-new Date(now.getFullYear(),0,1))/86400000+new Date(now.getFullYear(),0,1).getDay()+1)/7);
var monthKey=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
var dayNames=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];

var defaultRoutines=[
{id:'eau',txt:'💧 Boire assez d\'eau'},
{id:'sport',txt:'💪 Faire du sport'},
{id:'ranger',txt:'🛏️ Ranger sa chambre'},
{id:'notion',txt:'📱 Répondre sur Notion'},
{id:'soin',txt:'🧘 Moment pour soi'},
{id:'repas',txt:'🍽️ Bien manger'},
{id:'sommeil',txt:'😴 8h de sommeil'}
];

var encouragements=[
{min:0,max:0,emj:'😴',txt:'Allez, on commence !',cls:'l1'},
{min:1,max:25,emj:'🌱',txt:'C\'est un début, continue !',cls:'l1'},
{min:26,max:50,emj:'💪',txt:'T\'es sur la bonne voie !',cls:'l2'},
{min:51,max:75,emj:'🔥',txt:'Plus de la moitié, lâche rien !',cls:'l2'},
{min:76,max:99,emj:'🚀',txt:'Presque ! Dernier effort !',cls:'l3'},
{min:100,max:100,emj:'🏆',txt:'TOUT COMPLÉTÉ ! T\'es un(e) champion(ne) !',cls:'l4'}
];

document.getElementById('day').textContent=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});

function toggleWho(w){me=me===w?null:w;
document.getElementById('wa').className='wbtn'+(me==='a'?' s':'');
document.getElementById('wk').className='wbtn'+(me==='k'?' s':'');
if(me&&tab<4)listenCurrent();
else if(tab===4)loadStats();
else{document.getElementById('zone').innerHTML='<div style="text-align:center;color:#9a958e;padding:20px">Sélectionne ton nom ↑</div>';hideEnc()}}

function setTab(t){tab=t;
for(var i=0;i<5;i++)document.getElementById('t'+i).className='tab'+(i===t?' s':'');
if(!me){document.getElementById('zone').innerHTML='<div style="text-align:center;color:#9a958e;padding:20px">Sélectionne ton nom ↑</div>';hideEnc();return}
if(t===4)loadStats();else listenCurrent();}

function hideEnc(){document.getElementById('enc').className='encourage';document.getElementById('enc').innerHTML=''}

function showEnc(pct){
var e=encouragements.find(function(x){return pct>=x.min&&pct<=x.max})||encouragements[0];
var el=document.getElementById('enc');
el.className='encourage v '+e.cls;
var html='<span class="emj">'+e.emj+'</span>'+e.txt;
if(pct===100)html+='<div class="confetti" id="conf"></div>';
el.innerHTML=html;
if(pct===100)launchConfetti();
}

function launchConfetti(){
var c=document.getElementById('conf');if(!c)return;
var emojis=['🎉','⭐','🏆','💪','🔥','✨'];
for(var i=0;i<8;i++){
  var s=document.createElement('span');
  s.textContent=emojis[i%emojis.length];
  s.style.left=(Math.random()*60-30)+'px';
  s.style.animationDelay=(Math.random()*0.5)+'s';
  c.appendChild(s);
}}

function getRef(){
var keys=['routine-'+me+'-'+today,'todo-'+me,'week-'+me+'-'+weekKey,'month-'+me+'-'+monthKey];
return db.collection('couple').doc(keys[tab]);}

function calcPct(items,checked){
if(!items||!items.length)return 0;
var done=items.filter(function(it){return checked?checked[it.id]:it.done}).length;
return Math.round(done/items.length*100);}

function buildList(data,type,label){
var d=data||{};
var items,checked;
if(type==='routine'){
  var custom=d.custom||[];
  items=defaultRoutines.concat(custom.map(function(c,i){return{id:'c'+i,txt:c}}));
  checked=d.checked||{};
}else{items=d.items||[];checked=null}
var total=items.length;
var doneCount=type==='routine'?items.filter(function(it){return checked[it.id]}).length:items.filter(function(it){return it.done}).length;
var pct=total>0?Math.round(doneCount/total*100):0;
var lvl=pct<26?'l1':pct<51?'l2':pct<76?'l3':'l4';

showEnc(pct);

var html='<div class="ptext">'+doneCount+' / '+total+' — '+pct+'%</div>';
html+='<div class="progress"><div class="pbar '+lvl+'" style="width:'+pct+'%"></div></div>';
items.forEach(function(it,i){
  var isDone=type==='routine'?checked[it.id]:it.done;
  html+='<div class="item'+(isDone?' done':'')+'">';
  if(type==='routine')html+='<div class="cb'+(isDone?' checked':'')+'" onclick="toggleR(\''+it.id+'\')">'+( isDone?'✓':'')+'</div>';
  else html+='<div class="cb'+(isDone?' checked':'')+'" onclick="toggleI('+i+')">'+(isDone?'✓':'')+'</div>';
  html+='<div class="itxt">'+it.txt+'</div>';
  if(type==='routine'&&it.id.startsWith('c'))html+='<button class="del" onclick="delCR('+it.id.slice(1)+')">✕</button>';
  if(type!=='routine')html+='<button class="del" onclick="delI('+i+')">✕</button>';
  html+='</div>';
});
var ph=type==='routine'?'routine':type==='todo'?'tâche':'objectif '+label;
html+='<div class="addrow"><input class="addin" id="addIn" placeholder="+ Ajouter une '+ph+'..." onkeydown="if(event.key===\'Enter\')addItem(\''+type+'\')"><button class="addbtn" onclick="addItem(\''+type+'\')">+</button></div>';
html+='<button class="rst" onclick="resetCurrent()">🔄 Reset</button>';
document.getElementById('zone').innerHTML=html;}

function toggleR(id){getRef().get().then(function(doc){
var d=doc.exists?doc.data():{};var c=d.checked||{};c[id]=!c[id];
return getRef().set({checked:c,custom:d.custom||[]},{merge:true})}).then(showSt)}

function toggleI(i){getRef().get().then(function(doc){
var d=doc.exists?doc.data():{};var items=d.items||[];
if(items[i])items[i].done=!items[i].done;
return getRef().set({items:items},{merge:true})}).then(showSt)}

function addItem(type){
var el=document.getElementById('addIn');if(!el||!el.value.trim())return;var v=el.value.trim();
getRef().get().then(function(doc){
var d=doc.exists?doc.data():{};
if(type==='routine'){var c=d.custom||[];c.push(v);return getRef().set({custom:c},{merge:true})}
else{var items=d.items||[];items.push({txt:v,done:false});return getRef().set({items:items},{merge:true})}
}).then(showSt)}

function delCR(i){getRef().get().then(function(doc){
var d=doc.exists?doc.data():{};var c=d.custom||[];c.splice(i,1);
return getRef().set({custom:c},{merge:true})})}

function delI(i){getRef().get().then(function(doc){
var d=doc.exists?doc.data():{};var items=d.items||[];items.splice(i,1);
return getRef().set({items:items},{merge:true})})}

function resetCurrent(){getRef().delete().then(function(){
document.getElementById('status').textContent='🔄 Reset !';
setTimeout(function(){document.getElementById('status').textContent=''},1500)})}

function showSt(){document.getElementById('status').textContent='✅ Sauvegardé !';
setTimeout(function(){document.getElementById('status').textContent=''},1500)}

function loadStats(){
if(!me){document.getElementById('zone').innerHTML='<div style="text-align:center;color:#9a958e;padding:20px">Sélectionne ton nom ↑</div>';return}
hideEnc();
var promises=[];var labels=[];
for(var i=6;i>=0;i--){
  var dt=new Date();dt.setDate(dt.getDate()-i);
var key='routine-'+me+'-'+dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
  promises.push(db.collection('couple').doc(key).get());
}
Promise.all(promises).then(function(docs){
var pcts=[];var totalDone=0;var totalTasks=0;
docs.forEach(function(doc){
  if(doc.exists){
    var d=doc.data();var checked=d.checked||{};
    var custom=d.custom||[];
    var items=defaultRoutines.concat(custom.map(function(c,i){return{id:'c'+i}}));
    var done=items.filter(function(it){return checked[it.id]}).length;
    pcts.push(Math.round(done/items.length*100));
    totalDone+=done;totalTasks+=items.length;
  }else{pcts.push(0);totalTasks+=defaultRoutines.length}
});
var avg=totalTasks>0?Math.round(totalDone/totalTasks*100):0;
var streak=0;for(var j=pcts.length-1;j>=0;j--){if(pcts[j]>=80)streak++;else break}
var best=Math.max.apply(null,pcts);

var html='<div class="bar-row">';
pcts.forEach(function(p,i){
  var h=Math.max(4,p*1.2);
  var cls=p>=80?'good':p>=40?'mid':'low';
  html+='<div class="bar-col"><div class="bar-pct">'+p+'%</div><div class="bar '+cls+'" style="height:'+h+'px"></div><div class="bar-label">'+labels[i]+'</div></div>';
});
html+='</div>';
html+='<div class="stat-box">';
html+='<div class="stat"><div class="sv">'+avg+'%</div><div class="sl">Moyenne</div></div>';
html+='<div class="stat"><div class="sv">'+streak+'</div><div class="sl">Jours de suite 🔥</div></div>';
html+='<div class="stat"><div class="sv">'+best+'%</div><div class="sl">Meilleur jour</div></div>';
html+='<div class="stat"><div class="sv">'+totalDone+'</div><div class="sl">Tâches faites</div></div>';
html+='</div>';
document.getElementById('zone').innerHTML=html;
})}

var unsub=null;
function listenCurrent(){
if(!me)return;
if(unsub)unsub();
unsub=getRef().onSnapshot(function(doc){
var d=doc.exists?doc.data():null;
if(tab===0)buildList(d,'routine','');
else if(tab===1)buildList(d,'todo','');
else if(tab===2)buildList(d,'goal','semaine');
else if(tab===3)buildList(d,'goal','mois');
})}
</script>
</body>
</html>
