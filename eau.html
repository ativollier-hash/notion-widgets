<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:#faf8f5;padding:14px}
.w{background:#fff;border-radius:22px;padding:24px;max-width:700px;margin:0 auto;box-shadow:0 4px 24px rgba(0,0,0,.05);border:1px solid #ece8e2;text-align:center}
h2{font-family:'Playfair Display',serif;font-size:18px;color:#2d2a26;margin-bottom:2px}
.sub{font-size:11px;color:#9a958e;margin-bottom:16px}
.row{display:flex;gap:20px}
.col{flex:1;min-width:0;text-align:center}
.name{font-size:14px;font-weight:700;color:#2d2a26;margin-bottom:1px}
.obj{font-size:10px;color:#b0ab9f;font-weight:600;margin-bottom:10px}
.glass{position:relative;width:80px;height:160px;margin:0 auto 10px;border:3px solid #c0d8ec;border-top:none;border-radius:0 0 16px 16px;background:#f5faff;overflow:hidden}
.glass-rim{width:86px;height:5px;background:#c0d8ec;border-radius:4px;margin:0 auto;position:relative}
.water{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(180deg,#8ed4f8 0%,#4ba8e8 100%);transition:height .7s cubic-bezier(.4,0,.2,1);border-radius:0 0 13px 13px}
.wave{position:absolute;top:-5px;left:-10%;width:120%;height:12px;background:radial-ellipse;opacity:.4;animation:wav 2.5s ease-in-out infinite alternate}
@keyframes wav{0%{transform:translateX(-5%)}100%{transform:translateX(5%)}}
.pct{position:absolute;bottom:8px;left:0;right:0;font-family:'Playfair Display',serif;font-size:16px;font-weight:800;color:rgba(255,255,255,.95);text-shadow:0 1px 2px rgba(0,0,0,.2);z-index:2}
.lit{font-family:'Playfair Display',serif;font-size:24px;font-weight:800;color:#4ba8e8}
.of{font-size:11px;color:#9a958e;font-weight:600;margin-bottom:8px}
.btns{display:flex;gap:5px;justify-content:center;margin-bottom:6px}
.b{padding:8px 12px;border:2px solid #d4ecf7;border-radius:12px;background:#f0f8ff;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:12px;color:#4ba8e8;transition:all .15s}
.b:hover{background:#4ba8e8;color:#fff;border-color:#4ba8e8;transform:scale(1.05)}
.b:active{transform:scale(.95)}
.undo{padding:5px 12px;border:1.5px solid #ece8e2;border-radius:8px;background:#fff;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:10px;color:#9a958e;transition:all .15s}
.undo:hover{border-color:#e07a5f;color:#e07a5f}
.msg{font-size:11px;color:#9a958e;margin-top:5px;min-height:16px;font-style:italic}
.sep{width:1px;background:#ece8e2;align-self:stretch}
.ft{margin-top:12px;font-size:9px;color:#c5c0b8}
@keyframes splash{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-30px) scale(.5)}}
.drop{position:absolute;font-size:16px;z-index:5;pointer-events:none;animation:splash .6s ease forwards}
</style>
</head>
<body>
<div class="w">
<h2>Tracker d'Eau 💧</h2>
<div class="sub">Clique pour remplir ton verre !</div>
<div class="row">
<div class="col">
<div class="name">Alexandre</div>
<div class="obj">Objectif : 3,5 L</div>
<div class="glass-rim"></div>
<div class="glass" id="ga">
<div class="water" id="wa" style="height:0%"></div>
<div class="pct" id="pa"></div>
</div>
<div class="lit" id="la">0 L</div>
<div class="of">/ 3,5 L</div>
<div class="btns">
<button class="b" onclick="add('a',.25)">🥤 25cl</button>
<button class="b" onclick="add('a',.5)">🧴 50cl</button>
<button class="b" onclick="add('a',1)">🍶 1L</button>
</div>
<button class="undo" onclick="undo('a')">↩ Annuler</button>
<div class="msg" id="ma"></div>
</div>
<div class="sep"></div>
<div class="col">
<div class="name">Klara</div>
<div class="obj">Objectif : 2,5 L</div>
<div class="glass-rim"></div>
<div class="glass" id="gk">
<div class="water" id="wk" style="height:0%"></div>
<div class="pct" id="pk"></div>
</div>
<div class="lit" id="lk">0 L</div>
<div class="of">/ 2,5 L</div>
<div class="btns">
<button class="b" onclick="add('k',.25)">🥤 25cl</button>
<button class="b" onclick="add('k',.5)">🧴 50cl</button>
<button class="b" onclick="add('k',1)">🍶 1L</button>
</div>
<button class="undo" onclick="undo('k')">↩ Annuler</button>
<div class="msg" id="mk"></div>
</div>
</div>
<div class="ft">🏰💕🐟 Nous Deux.</div>
</div>
<script>
var goals={a:3.5,k:2.5},data={a:0,k:0},hist={a:[],k:[]};

function getMsg(v,g){
var p=v/g;
if(p<=0)return'';
if(p<.25)return'Bien commencé !';
if(p<.5)return'Continue 👍';
if(p<.75)return'Plus de la moitié 💪';
if(p<1)return'Presque 🔥';
if(p>=1)return'Objectif atteint 🏆';
}

function render(w){
var g=goals[w],v=data[w];
var pct=Math.min(100,Math.round((v/g)*100));
document.getElementById('w'+w).style.height=pct+'%';
document.getElementById('p'+w).textContent=pct>8?pct+'%':'';
document.getElementById('l'+w).textContent=v.toFixed(2).replace('.',',')+' L';
document.getElementById('m'+w).textContent=getMsg(v,g);
}

function drop(w){
var el=document.getElementById('g'+w);
var d=document.createElement('div');
d.className='drop';
d.textContent='💧';
d.style.left=Math.random()*50+15+'%';
d.style.top='10%';
el.appendChild(d);
setTimeout(function(){d.remove()},600);
}

function add(w,amt){
hist[w].push(data[w]);
data[w]=Math.round((data[w]+amt)*100)/100;
drop(w);render(w);
}

function undo(w){
if(hist[w].length){data[w]=hist[w].pop();render(w)}
}

render('a');render('k');
</script>
</body>
</html>
