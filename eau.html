<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:#faf8f5;padding:14px}
.w{background:#fff;border-radius:22px;padding:24px;max-width:700px;margin:0 auto;box-shadow:0 4px 24px rgba(0,0,0,.05);border:1px solid #ece8e2;text-align:center}
h2{font-family:'Playfair Display',serif;font-size:18px;color:#2d2a26;margin-bottom:2px}
.sub{font-size:12px;color:#9a958e;margin-bottom:16px}
.row{display:flex;gap:24px}
.col{flex:1;min-width:0;text-align:center}
.name{font-size:14px;font-weight:700;color:#2d2a26;margin-bottom:2px}
.goal-txt{font-size:10px;color:#b0ab9f;font-weight:600;margin-bottom:12px}
.glass-wrap{position:relative;width:90px;height:180px;margin:0 auto 12px;border-radius:0 0 18px 18px;border:3px solid #c8dff0;border-top:none;background:#f5faff;overflow:hidden}
.glass-top{width:100px;height:4px;background:#c8dff0;border-radius:4px;margin:0 auto;position:relative;left:-5px}
.water{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(180deg,#8ed4f8,#4ba8e8);transition:height .6s ease;border-radius:0 0 15px 15px}
.water::after{content:'';position:absolute;top:0;left:0;right:0;height:6px;background:rgba(255,255,255,.3);border-radius:3px}
@keyframes wave{0%,100%{transform:translateX(-50%) scaleY(1)}50%{transform:translateX(-50%) scaleY(.7)}}
.wave{position:absolute;top:-4px;left:50%;width:200%;height:10px;background:radial-gradient(ellipse at center,rgba(255,255,255,.4) 0%,transparent 70%);animation:wave 3s ease-in-out infinite}
.liters{font-family:'Playfair Display',serif;font-size:28px;font-weight:800;color:#4ba8e8;margin-bottom:2px}
.of{font-size:12px;color:#9a958e;font-weight:600}
.btns{display:flex;gap:6px;justify-content:center;margin-top:10px}
.b{padding:8px 14px;border:2px solid #d4ecf7;border-radius:12px;background:#f0f8ff;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:12px;color:#4ba8e8;transition:all .2s}
.b:hover{background:#4ba8e8;color:#fff;border-color:#4ba8e8;transform:translateY(-2px)}
.b:active{transform:translateY(0)}
.undo{padding:6px 12px;border:1.5px solid #ece8e2;border-radius:10px;background:#fff;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:11px;color:#9a958e;transition:all .2s;margin-top:8px}
.undo:hover{border-color:#e07a5f;color:#e07a5f}
.sep{width:1px;background:#ece8e2;align-self:stretch}
.msg{font-size:11px;color:#9a958e;margin-top:6px;min-height:16px;font-style:italic}
.pct{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Playfair Display',serif;font-size:20px;font-weight:800;color:rgba(255,255,255,.9);z-index:2;text-shadow:0 1px 3px rgba(0,0,0,.15)}
.reset{margin-top:14px;padding:8px 18px;border:1.5px solid #ece8e2;border-radius:10px;background:#fff;font-family:'Nunito',sans-serif;font-weight:700;font-size:11px;cursor:pointer;color:#9a958e;transition:all .2s}
.reset:hover{border-color:#e07a5f;color:#e07a5f}
.ft{margin-top:12px;font-size:9px;color:#c5c0b8}
@keyframes splash{0%{transform:scale(1);opacity:1}100%{transform:scale(2);opacity:0}}
.splasher{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:40px;height:40px;border-radius:50%;background:rgba(75,168,232,.3);pointer-events:none;animation:splash .5s ease forwards;z-index:3}
</style>
</head>
<body>
<div class="w">
<h2>Tracker d'Eau 💧</h2>
<div class="sub">Restez hydratés !</div>
<div class="row">
<div class="col" id="col-a">
<div class="name">Alexandre</div>
<div class="goal-txt">Objectif : 3,5L</div>
<div class="glass-top"></div>
<div class="glass-wrap" id="glass-a">
<div class="water" id="water-a" style="height:0"><div class="wave"></div></div>
<div class="pct" id="pct-a"></div>
</div>
<div class="liters" id="lit-a">0 L</div>
<div class="of">/ 3,5 L</div>
<div class="btns">
<button class="b" onclick="add('a',0.25)">25cl</button>
<button class="b" onclick="add('a',0.5)">50cl</button>
<button class="b" onclick="add('a',1)">1L</button>
</div>
<button class="undo" onclick="undo('a')">↩ Annuler</button>
<div class="msg" id="msg-a"></div>
</div>
<div class="sep"></div>
<div class="col" id="col-k">
<div class="name">Klara</div>
<div class="goal-txt">Objectif : 2,5L</div>
<div class="glass-top"></div>
<div class="glass-wrap" id="glass-k">
<div class="water" id="water-k" style="height:0"><div class="wave"></div></div>
<div class="pct" id="pct-k"></div>
</div>
<div class="liters" id="lit-k">0 L</div>
<div class="of">/ 2,5 L</div>
<div class="btns">
<button class="b" onclick="add('k',0.25)">25cl</button>
<button class="b" onclick="add('k',0.5)">50cl</button>
<button class="b" onclick="add('k',1)">1L</button>
</div>
<button class="undo" onclick="undo('k')">↩ Annuler</button>
<div class="msg" id="msg-k"></div>
</div>
</div>
<button class="reset" onclick="resetAll()">🔄 Reset Journée</button>
<div class="ft">🏰💕🐟 Nous Deux.</div>
</div>
<script>
var goals={a:3.5,k:2.5};
var data={a:0,k:0};
var history={a:[],k:[]};
var KEY='water-v2';

function load(){
try{var s=localStorage.getItem(KEY);
if(s){var d=JSON.parse(s);if(d.day===new Date().toDateString()){data=d.data;history=d.history||{a:[],k:[]}}}
}catch(e){}
}

function save(){
localStorage.setItem(KEY,JSON.stringify({day:new Date().toDateString(),data:data,history:history}));
}

function getMsg(who){
var pct=data[who]/goals[who];
if(pct<=0)return'';
if(pct<.25)return'C\'est un début !';
if(pct<.5)return'Continue 👍';
if(pct<.75)return'Bien parti(e) 💪';
if(pct<1)return'Presque 🔥';
return'Objectif atteint 🏆';
}

function render(){
['a','k'].forEach(function(w){
var pct=Math.min(1,data[w]/goals[w]);
var h=Math.round(pct*100);
document.getElementById('water-'+w).style.height=h+'%';
document.getElementById('pct-'+w).textContent=h>10?(h+'%'):'';
document.getElementById('lit-'+w).textContent=data[w].toFixed(2).replace('.',',')+' L';
document.getElementById('msg-'+w).textContent=getMsg(w);
});
}

function add(who,amount){
history[who].push(data[who]);
data[who]=Math.round((data[who]+amount)*100)/100;
save();render();
var g=document.getElementById('glass-'+who);
var s=document.createElement('div');
s.className='splasher';
g.appendChild(s);
setTimeout(function(){s.remove()},500);
}

function undo(who){
if(history[who].length>0){
data[who]=history[who].pop();
save();render();
}
}

function resetAll(){
data={a:0,k:0};history={a:[],k:[]};save();render();
}

load();render();
</script>
</body>
</html>
