<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:#faf8f5;padding:14px}
.w{background:#fff;border-radius:22px;padding:24px;max-width:750px;margin:0 auto;box-shadow:0 4px 24px rgba(0,0,0,.05);border:1px solid #ece8e2;text-align:center;position:relative}
.settings{position:absolute;top:12px;right:14px;font-size:14px;color:#c5c0b8;text-decoration:none;cursor:pointer;transition:color .2s}
.settings:hover{color:#e07a5f}
h2{font-family:'Playfair Display',serif;font-size:19px;color:#2d2a26;margin-bottom:2px}
.day{font-size:11px;color:#b0ab9f;font-weight:600;margin-bottom:10px;text-transform:capitalize}
.info{font-size:12px;color:#9a958e;margin-bottom:12px;font-style:italic}
.who{display:flex;gap:8px;justify-content:center;margin-bottom:14px}
.wbtn{padding:8px 18px;border:2.5px solid #ece8e2;border-radius:12px;background:#fff;font-family:'Nunito',sans-serif;font-weight:700;font-size:12px;cursor:pointer;transition:all .15s;color:#2d2a26}
.wbtn:hover{border-color:#e07a5f;color:#e07a5f}
.wbtn.s{border-color:#e07a5f;background:#e07a5f;color:#fff}
.step-box{background:linear-gradient(135deg,#fff5f2,#fef9f0);border-radius:16px;padding:14px;margin-bottom:12px}
.step-label{font-size:11px;color:#9a958e;font-weight:600;margin-bottom:4px}
.step-title{font-family:'Playfair Display',serif;font-size:16px;color:#2d2a26}
.write-area{text-align:left;max-width:480px;margin:0 auto 12px}
.write-area label{font-size:12px;font-weight:700;color:#2d2a26;display:block;margin-bottom:4px}
.write-area .hint{font-size:10px;color:#b0ab9f;margin-bottom:8px}
.write-area input{width:100%;padding:10px 14px;border:1.5px solid #ece8e2;border-radius:12px;font-family:'Nunito',sans-serif;font-size:13px;color:#2d2a26;background:#faf8f5;outline:none;margin-bottom:8px}
.write-area input:focus{border-color:#e07a5f}
.write-area .lie-label{color:#e07a5f}
.val-btn{padding:10px 28px;border:none;border-radius:12px;background:#e07a5f;color:#fff;font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;cursor:pointer;margin:8px 0;transition:all .2s}
.val-btn:hover{background:#c9694f;transform:translateY(-1px)}
.guess-area{max-width:480px;margin:0 auto 12px;text-align:left}
.guess-area .gname{font-family:'Playfair Display',serif;font-size:15px;color:#2d2a26;margin-bottom:8px;text-align:center}
.stmt{padding:12px 14px;border:2.5px solid #ece8e2;border-radius:14px;margin-bottom:8px;cursor:pointer;transition:all .2s;font-size:13px;color:#2d2a26;font-weight:600;display:flex;align-items:center;gap:10px}
.stmt:hover{border-color:#e07a5f;transform:translateY(-1px)}
.stmt.sel{border-color:#e07a5f;background:rgba(224,122,95,.06)}
.stmt .num{width:28px;height:28px;border-radius:50%;background:#f5f2ed;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#9a958e;flex-shrink:0}
.stmt.sel .num{background:#e07a5f;color:#fff}
.result-area{max-width:520px;margin:0 auto 12px}
.result-card{background:#faf8f5;border-radius:16px;padding:16px;margin-bottom:12px;text-align:left}
.result-card .rname{font-family:'Playfair Display',serif;font-size:15px;color:#2d2a26;margin-bottom:10px;text-align:center}
.rstmt{padding:10px 12px;border-radius:10px;margin-bottom:6px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:10px}
.rstmt.truth{background:rgba(107,189,123,.08);color:#2d8a4e;border:1.5px solid rgba(107,189,123,.2)}
.rstmt.lie{background:rgba(224,122,95,.08);color:#c9694f;border:1.5px solid rgba(224,122,95,.2)}
.rstmt .tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;margin-left:auto;flex-shrink:0}
.rstmt.truth .tag{background:rgba(107,189,123,.15);color:#2d8a4e}
.rstmt.lie .tag{background:rgba(224,122,95,.15);color:#c9694f}
.verdict{padding:14px;border-radius:14px;margin:10px auto;max-width:400px;display:none;text-align:center}
.verdict.v{display:block;animation:fi .5s ease}
.verdict.win{background:linear-gradient(135deg,#f0faf2,#e8f5e9)}
.verdict.lose{background:linear-gradient(135deg,#fff5f2,#fef9f0)}
.verdict .vtxt{font-family:'Playfair Display',serif;font-size:18px;color:#2d2a26}
.verdict .vsub{font-size:12px;color:#9a958e;margin-top:2px}
.players{display:flex;gap:20px;justify-content:center;margin:10px 0}
.player{text-align:center;min-width:80px}
.player .nm{font-size:11px;font-weight:700;color:#2d2a26}
.player .st{font-size:18px;margin-top:2px}
.rst{font-size:9px;color:#c5c0b8;border:1.5px solid #f0ebe4;border-radius:8px;padding:4px 12px;background:#fff;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:600;margin-top:12px}
.rst:hover{color:#e07a5f;border-color:#e07a5f}
.status{font-size:10px;color:#6bbd7b;margin-top:6px;font-weight:600;min-height:14px}
.lastmaj{font-size:10px;color:#b0ab9f;margin-top:10px;font-style:italic}
.ft{margin-top:8px;font-size:9px;color:#c5c0b8}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="w">
<a class="settings" href="https://ativollier-hash.github.io/notion-widgets/reset-center.html">⚙️</a>
<h2>2 Vérités 1 Mensonge 🤥</h2>
<div class="day" id="day"></div>
<div class="info" id="info">Écris 2 vérités et 1 mensonge — l'autre doit trouver le mensonge !</div>
<div class="who">
<button class="wbtn" id="wa" onclick="toggleWho('a')">🏰 Alexandre</button>
<button class="wbtn" id="wk" onclick="toggleWho('k')">🐟 Klara</button>
</div>
<div id="zone"></div>
<button class="rst" onclick="resetGame()">🔄 Reset ce widget</button>
<div class="status" id="status"></div>
<div class="lastmaj" id="lastmaj"></div>
<div class="ft">🏰💕🐟 Nous Deux.</div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyDywRXlDSyFgI2BlmMCMXAMc2uZKUWJY54",authDomain:"notion-bdd.firebaseapp.com",projectId:"notion-bdd",storageBucket:"notion-bdd.firebasestorage.app",messagingSenderId:"641330827114",appId:"1:641330827114:web:0bf5fc986540a4c9085f13"});
var db=firebase.firestore(),me=null,myGuess=null;
var docRef=db.collection('couple').doc('2v1m');

document.getElementById('day').textContent=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

function timeAgo(ts){
if(!ts)return'';
var diff=(Date.now()-ts)/1000;
if(diff<60)return'à l\'instant';
if(diff<3600)return'il y a '+Math.floor(diff/60)+' min';
if(diff<86400)return'il y a '+Math.floor(diff/3600)+'h';
return'il y a '+Math.floor(diff/86400)+' j';
}

function toggleWho(w){me=me===w?null:w;myGuess=null;
document.getElementById('wa').className='wbtn'+(me==='a'?' s':'');
document.getElementById('wk').className='wbtn'+(me==='k'?' s':'');
render();}

function nm(w){return w==='a'?'🏰 Alexandre':'🐟 Klara'}
function other(){return me==='a'?'k':'a'}

function shuffle(arr){
var a=arr.slice();
for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}
return a;}

var cached=null;
function buildUI(d){cached=d||{};render();updateLastMaj();}

function render(){
var d=cached||{};
var html='';
var bothWrote=d.stmts_a&&d.stmts_k;
var bothGuessed=d.guess_a!==undefined&&d.guess_k!==undefined;

if(bothWrote&&bothGuessed){
  html+=buildResults(d);
  document.getElementById('zone').innerHTML=html;return;
}

if(!me){
  html='<div style="color:#9a958e;padding:20px">Sélectionne ton nom pour jouer ↑</div>';
  html+=buildPlayers(d);
  document.getElementById('zone').innerHTML=html;return;
}

var o=other();

if(!d['stmts_'+me]){
  html+='<div class="step-box"><div class="step-label">Étape 1</div><div class="step-title">Écris tes 3 affirmations</div></div>';
  html+='<div class="write-area">';
  html+='<label>✅ Vérité n°1</label><input id="v1" placeholder="Quelque chose de vrai sur toi...">';
  html+='<label>✅ Vérité n°2</label><input id="v2" placeholder="Une autre vérité...">';
  html+='<label class="lie-label">🤥 Mensonge</label><input id="lie" placeholder="Un truc faux mais crédible...">';
  html+='<div class="hint">L\'autre verra les 3 dans un ordre mélangé !</div>';
  html+='</div>';
  html+='<button class="val-btn" onclick="sendStatements()">Valider ✓</button>';
}
else if(d['stmts_'+o]&&d['guess_'+me]===undefined){
  var stmts=d['order_'+me]||d['stmts_'+o];
  html+='<div class="step-box"><div class="step-label">Étape 2</div><div class="step-title">Trouve le mensonge de '+nm(o)+' !</div></div>';
  html+='<div class="guess-area">';
  stmts.forEach(function(s,i){
    var sel=myGuess===i?' sel':'';
    html+='<div class="stmt'+sel+'" onclick="selectGuess('+i+')"><div class="num">'+(i+1)+'</div>'+s+'</div>';
  });
  html+='</div>';
  if(myGuess!==null)html+='<button class="val-btn" onclick="sendGuess()">C\'est le mensonge ! 🤥</button>';
}
else{
  html+='<div class="step-box"><div class="step-title">✅ C\'est fait !</div></div>';
  html+='<div style="color:#9a958e;font-size:12px;padding:10px">En attente de '+nm(o)+'...</div>';
}

html+=buildPlayers(d);
document.getElementById('zone').innerHTML=html;
}

function buildPlayers(d){
var html='<div class="players">';
['a','k'].forEach(function(w){
  var wrote=d['stmts_'+w];
  var guessed=d['guess_'+w]!==undefined;
  var st=wrote&&guessed?'✅✅':wrote?'✅⏳':'⏳⏳';
  html+='<div class="player"><div class="nm">'+nm(w)+'</div><div class="st">'+st+'</div></div>';
});
html+='</div>';return html;}

function buildResults(d){
var html='';
['a','k'].forEach(function(w){
  var o=w==='a'?'k':'a';
  var stmts=d['stmts_'+w];
  var order=d['order_'+o]||stmts;
  var lieIdx=d['lie_idx_'+w];
  var guessIdx=d['guess_'+o];
  var correct=order[guessIdx]===stmts[lieIdx];

  html+='<div class="result-card"><div class="rname">Les affirmations de '+nm(w)+'</div>';
  stmts.forEach(function(s,i){
    var isLie=i===lieIdx;
    html+='<div class="rstmt '+(isLie?'lie':'truth')+'">';
    html+=s;
    html+='<span class="tag">'+(isLie?'🤥 Mensonge':'✅ Vrai')+'</span></div>';
  });
  html+='<div class="verdict v '+(correct?'win':'lose')+'">';
  html+='<div class="vtxt">'+(correct?'🎉 '+nm(o)+' a trouvé !':'😅 '+nm(o)+' s\'est fait avoir !')+'</div>';
  html+='</div></div>';
});
return html;}

function selectGuess(i){myGuess=i;render();}

function sendStatements(){
var v1=document.getElementById('v1'),v2=document.getElementById('v2'),lie=document.getElementById('lie');
if(!v1||!v2||!lie||!v1.value.trim()||!v2.value.trim()||!lie.value.trim())return;
var stmts=[v1.value.trim(),v2.value.trim(),lie.value.trim()];
var lieIdx=2;
var shuffled=shuffle([0,1,2]);
var ordered=shuffled.map(function(i){return stmts[i]});
var u={};
u['stmts_'+me]=stmts;
u['lie_idx_'+me]=lieIdx;
u['order_'+other()]=ordered;
u['last_'+me]=Date.now();
docRef.set(u,{merge:true}).then(function(){
  me=null;myGuess=null;
  document.getElementById('wa').className='wbtn';
  document.getElementById('wk').className='wbtn';
  showSt();
});}

function sendGuess(){
if(myGuess===null||!me)return;
var u={};u['guess_'+me]=myGuess;u['last_'+me]=Date.now();
docRef.set(u,{merge:true}).then(function(){
  me=null;myGuess=null;
  document.getElementById('wa').className='wbtn';
  document.getElementById('wk').className='wbtn';
  showSt();
});}

function resetGame(){
if(!confirm('Reset le 2V1M ?'))return;
docRef.delete().then(function(){
me=null;myGuess=null;
document.getElementById('wa').className='wbtn';
document.getElementById('wk').className='wbtn';
document.getElementById('status').textContent='🔄 Reset !';
setTimeout(function(){document.getElementById('status').textContent=''},1500);
});}

function showSt(){document.getElementById('status').textContent='✅ Sauvegardé !';
setTimeout(function(){document.getElementById('status').textContent=''},1500)}

function updateLastMaj(){
var d=cached||{};
var parts=[];
if(d.last_a)parts.push('🏰 '+timeAgo(d.last_a));
if(d.last_k)parts.push('🐟 '+timeAgo(d.last_k));
document.getElementById('lastmaj').textContent=parts.length?'Dernière MAJ : '+parts.join(' · '):'';
}

docRef.onSnapshot(function(doc){buildUI(doc.exists?doc.data():null)});
setInterval(updateLastMaj,60000);
</script>
</body>
</html>
